    // ── STORAGE ─────────────────────────────────────────────────────
    function load(key) {
      try { const v = localStorage.getItem("tf_"+key); return v ? JSON.parse(v) : null; } catch { return null; }
    }
    function save(key, val) {
      try { localStorage.setItem("tf_"+key, JSON.stringify(val)); } catch {}
    }

    // ── CLAUDE API (via server proxy) ──────────────────────────────
    var aiRemaining = 3; // 하루 남은 횟수

    async function callClaude(system, user) {
      var res = await fetch("/api/claude", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ system: system, user: user }),
      });
      var data = await res.json();
      if (!res.ok) {
        if (data.remaining !== undefined) aiRemaining = data.remaining;
        throw new Error(data.error || "AI 오류");
      }
      if (data.remaining !== undefined) aiRemaining = data.remaining;
      return data.text || "";
    }

    // ── ANALYTICS ───────────────────────────────────────────────────
    function track(event) {
      var today = new Date().toISOString().slice(0, 10);
      var key = "stat:" + today + ":" + event;
      var count = (load(key) || 0) + 1;
      save(key, count);
    }

    function fetchStats() {
      var days = [];
      for (var i = 0; i < 14; i++) {
        var d = new Date(); d.setDate(d.getDate() - i);
        days.push(d.toISOString().slice(0, 10));
      }
      var events = ["visit","lesson_start","lesson_done","reaction_good","reaction_mid","reaction_bad","feedback_click","login_attempt"];
      var result = {};
      for (var di = 0; di < days.length; di++) {
        var day = days[di];
        result[day] = {};
        for (var ei = 0; ei < events.length; ei++) {
          result[day][events[ei]] = load("stat:" + day + ":" + events[ei]) || 0;
        }
      }
      return result;
    }

    function getTodayLesson() {
      var dayIndex = Math.floor(Date.now() / 86400000) % LESSON_POOL.length;
      return LESSON_POOL[dayIndex];
    }

    var C = {
      bg:"#08090d",surface:"#10121a",border:"#1e2130",
      accent:"#7ee8a2",accentDim:"#7ee8a215",
      blue:"#60a5fa",blueDim:"#60a5fa15",
      yellow:"#fbbf24",yellowDim:"#fbbf2415",
      orange:"#fb923c",red:"#f87171",
      text:"#e8eaf0",muted:"#4a5068",
    };


    // ── HOME ────────────────────────────────────────────────────────
    function HomeScreen(props) {
      var streak=props.streak, todayDone=props.todayDone, lesson=props.lesson, onStart=props.onStart, aiAvailable=props.aiAvailable, onEnableAI=props.onEnableAI;
      var days = ["S","M","T","W","T","F","S"];
      var today = new Date().getDay();
      var hour = new Date().getHours();
      var greeting = hour<5?{t:"Still up? 🌙",s:"자기 전 영어 한 입 어때요"}
        :hour<12?{t:"Good morning 👋",s:"매일 15분, 미국식 영어 트레이닝 💪"}
        :hour<18?{t:"Good afternoon ☀️",s:"점심 쉬는 틈에 영어 한 입 🥪"}
        :hour<22?{t:"Good evening 🌆",s:"오늘 하루 마무리 15분 💪"}
        :{t:"Late night study 🌙",s:"집중 잘 되는 시간이죠"};

      return (
        <div style={{padding:"32px 20px 24px"}}>
          <div style={{fontSize:12,color:C.muted,letterSpacing:3,marginBottom:6}}>

          </div>
          <div style={{fontSize:28,fontWeight:800,lineHeight:1.2,marginBottom:4}}>{greeting.t}</div>
          <div style={{fontSize:14,color:C.muted,marginBottom:20}}>{greeting.s}</div>


          <div style={{background:"linear-gradient(135deg,"+C.accent+"18,"+C.blue+"10)",border:"1px solid "+C.accent+"30",borderRadius:16,padding:20,marginBottom:16}}>

            <div style={{display:"flex",gap:6,marginTop:16}}>
              {days.map(function(d,i){return(
                <div key={i} style={{textAlign:"center"}}>
                  <div style={{width:28,height:28,borderRadius:8,background:i===today?(todayDone?C.accent:C.accentDim):(i<today?C.accent+"60":C.border),border:i===today?"2px solid "+C.accent:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:i<=today?C.accent:C.muted,fontWeight:700}}>
                    {i<today?"\u2713":i===today&&todayDone?"\u2713":""}
                  </div>

              );})}

                <div style={{fontSize:10,color:C.yellow,letterSpacing:2,marginBottom:4}}>기본동사</div>
                <div style={{fontSize:16,fontWeight:800,color:C.yellow}}>{lesson.basic?.verb}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>{lesson.basic?.meaning_ko?.split(",")[0]}</div>

    // ── LEARN ───────────────────────────────────────────────────────
    function LearnScreen(props) {
      var lesson=props.lesson, loading=props.loading, onNext=props.onNext, aiAvailable=props.aiAvailable;
      var _s1=useState("basic"); var phase=_s1[0]; var setPhase=_s1[1];
      var _s2=useState(0); var step=_s2[0]; var setStep=_s2[1];

      if (loading) return (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",gap:16}}>
          <div style={{fontSize:36}}>{"✨"}</div>
          <div style={{color:C.muted,fontSize:14}}>오늘의 레슨 준비 중...</div>
        </div>
      );
      if (!lesson) return null;

      var current = phase==="basic" ? lesson.basic : lesson.phrasal;
      var color = phase==="basic" ? C.yellow : C.accent;

      var goNext = function() {
        if (step<2) { setStep(function(s){return s+1;}); return; }
        if (phase==="basic") { setPhase("phrasal"); setStep(0); return; }
        onNext();
      };

      var btnLabel = step<2 ? "다음 →" : phase==="basic" ? "구동사 학습하기 →" : (aiAvailable ? "✍️ 내 문장 쓰러 가기" : "🎉 오늘 학습 완료");

      return (
        <div style={{padding:"24px 20px"}}>

    function SoloMode(props) {

      var _s2=useState(""); var transcript=_s2[0]; var setTranscript=_s2[1];

      var _s4=useState(null); var result=_s4[0]; var setResult=_s4[1];

      var recRef = useRef(null);

      var startRec = function() {
        var SR = window.SpeechRecognition||window.webkitSpeechRecognition;

            if(e.results[i].isFinal)fin+=e.results[i][0].transcript;

          setInterim(inter);
        };
        rec.onend=function(){setRecording(false);setInterim("");};
        rec.start(); recRef.current=rec;
        setRecording(true); setTranscript(""); setInterim(""); setResult(null);

      var reset=function(){setTranscript("");setResult(null);setInterim("");};

        callClaude(system,'한국어: "'+text+'"\n미국식으로 변환해줘.')
        .then(function(raw){
          var parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());

          var next=[Object.assign({},parsed,{id:Date.now()})].concat(history).slice(0,50);

                {isLoading?"✨ 번역 중...":"미국식으로 변환 →"}

          {result&&(

                </div>
              )}
              <button onClick={reset} style={{width:"100%",background:C.surface,border:"1px solid "+C.border,color:C.text,borderRadius:14,padding:14,fontSize:14,fontWeight:700,cursor:"pointer"}}>{"🎙️ 새 문장"}</button>
            </div>
          )}
        </div>
      );
    }

    // ── HISTORY ─────────────────────────────────────────────────────
    function HistoryScreen(props) {
      var history = props.history;
      if (!history.length) return (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",color:C.muted,gap:12}}>
          <div style={{fontSize:36}}>{"📚"}</div><div style={{fontSize:14}}>아직 학습 기록이 없어요</div>
        </div>
      );
      return (
        <div style={{padding:"24px 20px"}}>
          <div style={{fontSize:11,color:C.muted,letterSpacing:3,marginBottom:8}}>HISTORY</div>
          <div style={{fontSize:22,fontWeight:800,marginBottom:20}}>학습 기록</div>
          {[].concat(history).reverse().map(function(item,i){return(
            <div key={i} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:14,marginBottom:10}}>
              <div style={{fontSize:11,color:C.muted,marginBottom:10}}>{item.date}</div>
              <div style={{display:"flex",gap:8}}>
                <div style={{flex:1,background:C.yellowDim,border:"1px solid "+C.yellow+"30",borderRadius:8,padding:"8px 10px"}}>
                  <div style={{fontSize:10,color:C.yellow,marginBottom:3}}>기본동사</div>
                  <div style={{fontSize:15,fontWeight:800,color:C.yellow}}>{item.basic}</div>
                </div>
                <div style={{flex:1,background:C.accentDim,border:"1px solid "+C.accent+"30",borderRadius:8,padding:"8px 10px"}}>
                  <div style={{fontSize:10,color:C.accent,marginBottom:3}}>구동사</div>
                  <div style={{fontSize:15,fontWeight:800,color:C.accent}}>{item.phrasal}</div>
                </div>
              </div>
            </div>
          );})}
        </div>
      );
    }

    // ── ADMIN ───────────────────────────────────────────────────────
    function AdminScreen() {
      var stats = fetchStats();
      var days = Object.keys(stats).sort().reverse();
      return (
        <div style={{padding:"24px 20px"}}>
          <div style={{fontSize:11,color:C.muted,letterSpacing:3,marginBottom:6}}>ADMIN ONLY</div>
          <div style={{fontSize:22,fontWeight:800,marginBottom:20}}>{"📊 Talkfit 대시보드"}</div>
          {days.map(function(d){
            var s = stats[d];
            var hasActivity = Object.values(s).some(function(v){return v>0;});
            if (!hasActivity) return null;
            return (
              <div key={d} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:"10px 14px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                <div style={{fontSize:12,color:C.muted,fontWeight:700}}>{d}</div>
                <div style={{display:"flex",gap:10,fontSize:12,color:C.text}}>
                  <span>{"👥 "}{s.visit||0}</span>
                  <span>{"📖 "}{s.lesson_start||0}</span>
                  <span>{"✅ "}{s.lesson_done||0}</span>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ── APP ─────────────────────────────────────────────────────────
    function App() {
      var _s1=useState("home"); var tab=_s1[0]; var setTab=_s1[1];
      var _s2=useState("home"); var screen=_s2[0]; var setScreen=_s2[1];
      var _s3=useState(null); var lesson=_s3[0]; var setLesson=_s3[1];
      var _s4=useState(false); var todayDone=_s4[0]; var setTodayDone=_s4[1];
      var _s5=useState(0); var streak=_s5[0]; var setStreak=_s5[1];
      var _s6=useState(false); var loading=_s6[0]; var setLoading=_s6[1];
      var _s7=useState([]); var speakHistory=_s7[0]; var setSpeakHistory=_s7[1];
      var _s8=useState([]); var verbHistory=_s8[0]; var setVerbHistory=_s8[1];
      var aiAvailable = true; // AI 항상 활성화 (서버에서 횟수 제한)

      var isAdmin = false;
      try { isAdmin = new URLSearchParams(window.location.search).get("admin") === ADMIN_KEY; } catch(e){}

      var todayKey = function(){return new Date().toISOString().slice(0,10);};

      useEffect(function(){
        track("visit");
        var s = load("tk_state");
        if (s) {
          setStreak(s.streak||0);
          setVerbHistory(s.history||[]);
          if (s.todayKey===todayKey()) { setTodayDone(s.todayDone||false); if(s.lesson)setLesson(s.lesson); }
        }
        if (!lesson) setLesson(getTodayLesson());
        setSpeakHistory(load("speak_history") || []);
      }, []);

      var persist = function(updates) {
        var cur = load("tk_state")||{};
        for(var k in updates) cur[k]=updates[k];
        cur.todayKey = todayKey();
        save("tk_state", cur);
      };

      var handleStart = function() {
        track("lesson_start");
        if (!lesson) setLesson(getTodayLesson());
        setScreen("learn"); setTab("learn");
      };

      var handleComplete = function() {
        track("lesson_done");
        var newStreak = streak+1;
        var newHistory = [].concat(verbHistory,[{basic:lesson.basic.verb,phrasal:lesson.phrasal.verb,date:todayKey()}]);
        setStreak(newStreak); setTodayDone(true); setVerbHistory(newHistory);
        persist({streak:newStreak,todayDone:true,history:newHistory,lesson:lesson});
        setScreen("home"); setTab("home");
      };

      var TABS = [
        {id:"home",icon:"🏠",label:"홈"},
        {id:"speak",icon:"🎙️",label:"회화"},
        {id:"learn",icon:"📖",label:"오늘학습",action:true},
        {id:"history",icon:"📚",label:"기록"},
      ];

      return (
        <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:C.bg,color:C.text,display:"flex",flexDirection:"column"}}>
          <div style={{position:"sticky",top:0,zIndex:10,background:C.bg+"ee",backdropFilter:"blur(12px)",borderBottom:"1px solid "+C.border,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontWeight:900,fontSize:16,letterSpacing:-0.5}}>{"💪 Talkfit"}</div>
            {(screen==="learn"||screen==="practice"||screen==="admin")&&(
              <button onClick={function(){setScreen("home");setTab("home");}} style={{background:C.surface,border:"1px solid "+C.border,color:C.muted,borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer"}}>{"← 홈"}</button>
            )}
            {screen==="home"&&(
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {isAdmin && <button onClick={function(){setScreen("admin");}} style={{background:C.yellowDim,border:"1px solid "+C.yellow+"40",color:C.yellow,borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer",fontWeight:700}}>{"📊"}</button>}
                <div style={{fontSize:12,color:C.muted}}>{streak}{"🔥"}</div>
              </div>
            )}
          </div>

          <div style={{flex:1,overflowY:"auto",paddingBottom:90}}>
            {screen==="home"&&<HomeScreen streak={streak} todayDone={todayDone} lesson={lesson} onStart={handleStart} aiAvailable={aiAvailable} onEnableAI={function(){}}/>}
            {screen==="learn"&&<LearnScreen lesson={lesson} loading={loading} onNext={function(){setScreen("practice");}} aiAvailable={aiAvailable}/>}
            {screen==="practice"&&<PracticeScreen lesson={lesson} onComplete={handleComplete} aiAvailable={aiAvailable}/>}
            {screen==="history"&&<HistoryScreen history={verbHistory}/>}
            {screen==="speak"&&<SpeakScreen history={speakHistory} setHistory={setSpeakHistory} aiAvailable={aiAvailable}/>}
            {screen==="admin"&&<AdminScreen/>}
          </div>

          {screen!=="practice"&&screen!=="admin"&&(
            <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:C.surface+"f0",backdropFilter:"blur(20px)",borderTop:"1px solid "+C.border,display:"flex",padding:"10px 0 20px",zIndex:20}}>
              {TABS.map(function(t){return(
                <button key={t.id} onClick={function(){if(t.action){handleStart();}else{setTab(t.id);setScreen(t.id);}}} style={{flex:1,background:"none",border:"none",color:!t.action&&tab===t.id?C.accent:C.muted,cursor:"pointer",padding:"6px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <div style={{fontSize:t.action?22:18}}>{t.icon}</div>
                  <div style={{fontSize:10,fontWeight:tab===t.id?700:400}}>{t.label}</div>
                  {!t.action&&tab===t.id&&<div style={{width:4,height:4,borderRadius:"50%",background:C.accent}}/>}
                </button>
              );})}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
