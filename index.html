    // ── XP + LEVEL SYSTEM ──────────────────────────────────────────
    // 99레벨까지 — RPG 스타일 (지수 곡선)
    function levelName(lv) {
      if (lv <= 5) return "Beginner";
      if (lv <= 10) return "Starter";
      if (lv <= 20) return "Learner";
      if (lv <= 30) return "Speaker";
      if (lv <= 45) return "Talker";
      if (lv <= 60) return "Fluent";
      if (lv <= 80) return "Native-like";
      if (lv <= 98) return "Expert";
      return "Master";
    }
    function xpForLevel(lv) {
      // Lv1=0, Lv2=100, Lv3=250, Lv4=450, ... 점점 가파르게
      if (lv <= 1) return 0;
      return Math.floor(50 * lv * (lv - 1) + 50 * Math.pow(lv - 1, 1.5));
    }
    var LEVELS = (function(){
      var arr = [];
      for (var i = 1; i <= 99; i++) {
        arr.push({
          level: i,
          name: levelName(i),
          min: xpForLevel(i),
          max: i === 99 ? 9999999 : xpForLevel(i + 1)
        });
      }
      return arr;
    })();
    function getLevel(xp) {
      for (var i=LEVELS.length-1;i>=0;i--) { if (xp>=LEVELS[i].min) return LEVELS[i]; }
      return LEVELS[0];
    }
    // ── XP 시스템 v2 (디테일) ─────────────────────────────────────
    function addXP(amount, reason) {
      var state = load("xp_state") || {xp:0,totalEarned:0,history:[]};
      var oldLevel = getLevel(state.xp);
      var lv = oldLevel.level;

      // 1. 콤보 보너스 (5분 내 연속 정답)
      var now = Date.now();
      var lastCorrect = state.lastCorrectTime || 0;
      var combo = state.combo || 0;
      if (amount > 0) {
        if (now - lastCorrect < 5*60*1000) combo += 1;
        else combo = 1;
        state.lastCorrectTime = now;
        state.combo = combo;
      }
      var comboBonus = 1;
      if (combo >= 3) comboBonus = 1.2;  // x1.2
      if (combo >= 5) comboBonus = 1.5;  // x1.5
      if (combo >= 10) comboBonus = 2;   // x2

      // 2. 더블 XP 위켄드 (토/일)
      var day = new Date().getDay();
      var weekendBonus = (day === 0 || day === 6) ? 1.5 : 1;

      // 3. 고레벨 페널티 (실력 곡선)
      var lvPenalty = 1;
      if (lv >= 20) lvPenalty = 0.85;
      if (lv >= 40) lvPenalty = 0.65;
      if (lv >= 60) lvPenalty = 0.45;
      if (lv >= 80) lvPenalty = 0.25;

      var actualXP = amount > 0 ? Math.max(1, Math.round(amount * comboBonus * weekendBonus * lvPenalty)) : amount;
      state.xp = Math.max(0, state.xp + actualXP);
      state.totalEarned = (state.totalEarned||0) + Math.max(0, actualXP);

      // 히스토리 (최근 50개)
      state.history = (state.history||[]).slice(-49);
      state.history.push({t:now, amount:actualXP, reason:reason||"", combo:combo});

      var newLevel = getLevel(state.xp);
      save("xp_state", state);
      // 레벨업 셀러브레이션 트리거
      if (newLevel.level > oldLevel.level && window.__onLevelUp) {
        try { window.__onLevelUp(newLevel); } catch{}
      }
      return {
        xp: state.xp,
        leveledUp: newLevel.level > oldLevel.level,
        level: newLevel,
        gained: actualXP,
        base: amount,
        combo: combo,
        comboBonus: comboBonus,
        weekendBonus: weekendBonus !== 1 ? weekendBonus : null,
        lvPenalty: lvPenalty !== 1 ? lvPenalty : null
      };
    }

    // 연속 출석 (훈련 완료 시)
    function claimAttendanceBonus() {
      var todayK = (function(){var d=new Date();d.setHours(d.getHours()+9);return d.toISOString().slice(0,10);})();
      var att = load("attendance") || { lastDate: "", streak: 0, longestStreak: 0, totalDays: 0 };
      if (att.lastDate === todayK) return null;

      var yesterday = (function(){var d=new Date();d.setHours(d.getHours()+9);d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);})();
      if (att.lastDate === yesterday) {
        att.streak += 1;
      } else {
        att.streak = 1;
      }
      att.lastDate = todayK;
      att.totalDays = (att.totalDays||0) + 1;
      att.longestStreak = Math.max(att.longestStreak||0, att.streak);
      if(!att.daysLog) att.daysLog=[];
      if(att.daysLog.indexOf(todayK)===-1) att.daysLog.push(todayK);
      save("attendance", att);

      // 일일 보너스
      var bonus = 5;
      if (att.streak >= 3) bonus = 10;
      if (att.streak >= 7) bonus = 25;
      if (att.streak >= 14) bonus = 40;
      if (att.streak >= 30) bonus = 70;
      if (att.streak >= 100) bonus = 150;
      if (att.streak >= 365) bonus = 500;

      // 마일스톤 보너스 (특정 일수 달성)
      var milestoneBonus = 0;
      var milestoneText = "";
      if (att.streak === 7)  { milestoneBonus = 50;  milestoneText = "🥉 7일 달성!"; }
      if (att.streak === 30) { milestoneBonus = 200; milestoneText = "🥈 30일 달성!"; }
      if (att.streak === 100){ milestoneBonus = 500; milestoneText = "🥇 100일 달성!"; }
      if (att.streak === 365){ milestoneBonus = 2000;milestoneText = "🏆 1년 달성!"; }
      if (att.totalDays === 50){milestoneBonus += 100; milestoneText = "📅 누적 50일!"; }
      if (att.totalDays === 200){milestoneBonus += 500; milestoneText = "📅 누적 200일!"; }

      var totalBonus = bonus + milestoneBonus;
      var r = addXP(totalBonus, "출석 "+att.streak+"일");
      return { bonus: bonus, milestoneBonus: milestoneBonus, milestoneText: milestoneText, streak: att.streak, totalDays: att.totalDays, ...r };
    }

    // 정확도 보너스 (퀴즈 100% 정답 시)
    function claimAccuracyBonus(correctCount, totalCount) {
      if (correctCount === totalCount && totalCount >= 5) {
        var bonus = totalCount * 5; // 5문제 100% = +25, 10문제 100% = +50
        return addXP(bonus, "퍼펙트!");
      }
      return null;
    }

    // 빠른 응답 보너스 (3초 안에 정답)
    function claimSpeedBonus(answeredInMs) {
      if (answeredInMs < 3000) return addXP(2, "⚡ 빠른 응답");

    // ── TTS HELPER ─────────────────────────────────────────────────
    // **verb** 마크다운을 하이라이트로 변환하는 공용 함수
    function stripStars(t) { return (t||"").replace(/\*\*/g, ""); }

    // ── 전역 백그라운드 작업 매니저 ─────────────────────────────────
    // 컴포넌트가 언마운트돼도 작업은 계속 돌도록
    window.__bgTasks = window.__bgTasks || {
      // analyze: { status: "running"|"done"|"error", result: {...}, mode: "speak"|"file"|"youtube" }
      analyze: null,
      transcribe: null,
      youtube: null,
    };
    window.__bgListeners = window.__bgListeners || {};

    function setBgTask(name, value) {
      window.__bgTasks[name] = value;
      // 등록된 리스너 호출
      (window.__bgListeners[name]||[]).forEach(function(fn){try{fn(value);}catch{}});
    }
    function getBgTask(name) { return window.__bgTasks[name]; }
    function subscribeBgTask(name, fn) {
      if (!window.__bgListeners[name]) window.__bgListeners[name] = [];
      window.__bgListeners[name].push(fn);
      return function(){
        window.__bgListeners[name] = (window.__bgListeners[name]||[]).filter(function(f){return f!==fn;});
      };
    }
    function highlightVerbs(text, verbsUsed) {
      if (!text || !verbsUsed || verbsUsed.length === 0) return text;
      // 구동사 먼저 (긴 것 우선), 그 다음 기본동사
      var sorted = verbsUsed.slice().sort(function(a,b){return b.verb.length - a.verb.length;});
      var parts = [{text: text, verb: null}];
      sorted.forEach(function(v) {
        var vw = v.verb.toLowerCase();
        var isPhrasal = (v.type === "phrasal" || v.verb.indexOf(" ") !== -1);
        var regex = new RegExp("\\b(" + vw.replace(/[.*+?^${}()|[\]\\]/g,"\\$&") + "(?:s|ed|ing|d|es)?)\\b", "gi");
        var newParts = [];
        parts.forEach(function(p) {
          if (p.verb) { newParts.push(p); return; }
          var last = 0;
          var m;
          while ((m = regex.exec(p.text)) !== null) {
            if (m.index > last) newParts.push({text: p.text.slice(last, m.index), verb: null});
            newParts.push({text: m[0], verb: v, phrasal: isPhrasal});
            last = m.index + m[0].length;
          }
          if (last < p.text.length) newParts.push({text: p.text.slice(last), verb: null});
        });
        parts = newParts;
      });
      if (parts.every(function(p){return !p.verb;})) return text;
      return parts.map(function(p, i) {
        if (!p.verb) return p.text;
        var vc = p.phrasal ? C.accent : C.yellow;
        return React.createElement("span", {key: i, style: {color: vc, fontWeight: 700, opacity: 0.9}}, p.text);
      });
    }

    function renderHighlight(text, verbsUsed, opts) {
      if (!text) return text;
      if (text.indexOf("**") === -1) return text;
      var phrasalList = (verbsUsed||[]).filter(function(v){return v.type==="phrasal"||v.verb.indexOf(" ")!==-1;}).map(function(v){return v.verb.toLowerCase();});
      var dim = opts && opts.dim;
      var fontSize = opts && opts.fontSize;
      var koreanMode = opts && opts.korean;
      var verbIdx = 0;
      return text.split(/(\*\*[^*]+\*\*)/).map(function(part, i) {
        if (part.startsWith("**") && part.endsWith("**")) {
          var word = part.slice(2, -2);
          var isPhrasal;
          // 영어인 경우: 공백 포함 = 무조건 구동사
          if (!koreanMode && word.indexOf(" ") !== -1) {
            isPhrasal = true;
          } else if (koreanMode && verbsUsed && verbsUsed[verbIdx]) {
            // 한국어는 순서대로 매핑
            var v = verbsUsed[verbIdx];
            isPhrasal = (v.type === "phrasal" || v.verb.indexOf(" ") !== -1);
            verbIdx++;
          } else {
            // verbs_used 매칭 시도
            isPhrasal = phrasalList.some(function(p){
              var pl=p.toLowerCase(),wl=word.toLowerCase();
              return pl===wl || pl.indexOf(wl)!==-1 || wl.indexOf(pl)!==-1;
            });
          }
          var vc = isPhrasal ? C.accent : C.yellow;
          var style = {color: vc, fontWeight: dim ? 600 : 800};
          if (dim) style.opacity = 0.7;
          if (fontSize) style.fontSize = fontSize;
          return React.createElement("span", {key: i, style: style}, word);
        }
        return part;
      });
    }

    var ttsCache = {};
    var currentAudio = null;
    var ttsAbortController = null;
    var ttsRequestId = 0;
    var ttsLoadingBtn = null;
    var ttsOrigText = "";
    function speakEnglish(text, btnEl) {
      if (!text) return;
      var clean = text.replace(/\*\*/g, "").trim();
      // 이전 요청 취소
      if (ttsAbortController) { try { ttsAbortController.abort(); } catch{} }
      if (currentAudio) { try { currentAudio.pause(); currentAudio.currentTime = 0; } catch{} currentAudio = null; }
      if (window.speechSynthesis) try { window.speechSynthesis.cancel(); } catch{}
      // 로딩 표시
      if (ttsLoadingBtn && ttsOrigText) { ttsLoadingBtn.textContent = ttsOrigText; ttsLoadingBtn.disabled = false; ttsLoadingBtn.style.opacity="1"; }
      if (btnEl) { ttsOrigText = btnEl.textContent; btnEl.textContent = "🔊 로딩 중..."; btnEl.disabled = true; btnEl.style.opacity="0.5"; ttsLoadingBtn = btnEl; }
      function resetBtn(){ if(btnEl){btnEl.textContent=ttsOrigText||btnEl.textContent;btnEl.disabled=false;btnEl.style.opacity="1";} ttsLoadingBtn=null;ttsOrigText=""; }

      var myReq = ++ttsRequestId;

      if (ttsCache[clean]) {
        currentAudio = new Audio("data:audio/wav;base64," + ttsCache[clean]);
        currentAudio.play().catch(function(){fallbackSpeak(clean);});
        resetBtn();
        return;
      }

      ttsAbortController = new AbortController();
      fetch("/api/tts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: clean }),
        signal: ttsAbortController.signal
      }).then(function(r){return r.json();}).then(function(d){
        if (myReq !== ttsRequestId) return;
        if (d.audio) {
          ttsCache[clean] = d.audio;
          currentAudio = new Audio("data:audio/wav;base64," + d.audio);
          currentAudio.play().catch(function(){fallbackSpeak(clean);});
        } else {
          fallbackSpeak(clean);
        }
        resetBtn();
      }).catch(function(e){ if(e.name!=="AbortError") fallbackSpeak(clean); resetBtn(); });
    }
    function fallbackSpeak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      u.rate = 0.9;
      window.speechSynthesis.speak(u);
    }

    // ── QUIZ GENERATOR (expanded: 6-8 questions, multiple types) ──
    function generateQuiz(lessons) {
      // lessons is an array of 2 lesson sets
      var quizzes = [];
      var allVerbs = [];
      var allExamples = [];

      for (var li = 0; li < lessons.length; li++) {
        var lesson = lessons[li];
        allVerbs.push({verb: lesson.basic.verb, meaning: lesson.basic.meaning_ko, type: "basic", lessonIdx: li});
        allVerbs.push({verb: lesson.phrasal.verb, meaning: lesson.phrasal.meaning_ko, type: "phrasal", lessonIdx: li});
        for (var ei = 0; ei < lesson.basic.examples.length; ei++) {
          allExamples.push({ex: lesson.basic.examples[ei], verb: lesson.basic.verb, meaning: lesson.basic.meaning_ko});
        }
        for (var pi = 0; pi < lesson.phrasal.examples.length; pi++) {
          allExamples.push({ex: lesson.phrasal.examples[pi], verb: lesson.phrasal.verb, meaning: lesson.phrasal.meaning_ko});
        }
      }

      var wrongMeanings = ["참다","던지다","끌다","닫다","열다","세다","울다","웃다","쉬다","놀다","밀다","빌리다"];
      var wrongVerbs = ["give up","break down","show off","bring up","take over","call off","hang out","figure out","end up","carry on"];
      var wrongSentences = ["I have to go now.","She made a big mistake.","Can you take this?","Let me think about it.","He ran into some trouble.","We should call it a day."];

      // Q1: meaning quiz for lesson1 basic
      var b1 = lessons[0].basic;
      var correctM1 = b1.meaning_ko.split(",")[0].trim();
      var opts1 = [correctM1].concat(wrongMeanings.filter(function(w){return w!==correctM1;}).sort(function(){return Math.random()-0.5;}).slice(0,3)).sort(function(){return Math.random()-0.5;});
      quizzes.push({type:"meaning", question:'"'+b1.verb+'" 의 뜻은?', options:opts1, answer:correctM1, verb:b1.verb});

      // 동사 변형 매칭 (find→found/finds/finding, take out→took out/takes out 등)
      function makeVerbBlank(sentence, verb) {
        // 구동사: 각 단어 사이에 유연한 매칭
        var parts = verb.split(" ");
        var base = parts[0];
        // 불규칙 동사 변형 테이블
        var irregulars = {find:"found|finds|finding",get:"got|gets|getting",take:"took|takes|taking",make:"made|makes|making",go:"went|goes|going",have:"had|has|having",come:"came|comes|coming",give:"gave|gives|giving",put:"put|puts|putting",run:"ran|runs|running",say:"said|says|saying",think:"thought|thinks|thinking",know:"knew|knows|knowing",see:"saw|sees|seeing",keep:"kept|keeps|keeping",tell:"told|tells|telling",feel:"felt|feels|feeling",leave:"left|leaves|leaving",call:"called|calls|calling",turn:"turned|turns|turning",set:"set|sets|setting",show:"showed|shows|showing",end:"ended|ends|ending",look:"looked|looks|looking",work:"worked|works|working",break:"broke|breaks|breaking",hold:"held|holds|holding",bring:"brought|brings|bringing",let:"let|lets|letting",stand:"stood|stands|standing",hear:"heard|hears|hearing",try:"tried|tries|trying"};
        var forms = base + (irregulars[base] ? "|" + irregulars[base] : "|" + base + "s|" + base + "ed|" + base + "ing");
        var pattern;
        if (parts.length > 1) {
          pattern = new RegExp("\\b(" + forms + ")\\s+" + parts.slice(1).join("\\s+").replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + "\\b", "i");
        } else {
          pattern = new RegExp("\\b(" + forms + ")\\b", "i");
        }
        var result = sentence.replace(pattern, "______");
        return result !== sentence ? result : sentence.replace(new RegExp(verb.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"i"), "______");
      }

      // Q2: fill-blank for lesson1 phrasal
      var p1 = lessons[0].phrasal;
      var ex1 = p1.examples[0];
      var blank1 = makeVerbBlank(ex1.english, p1.verb);
      if(blank1.indexOf("______")!==-1){
        var wrongV1 = wrongVerbs.filter(function(v){return v!==p1.verb;}).sort(function(){return Math.random()-0.5;}).slice(0,3);
        var opts2 = [p1.verb].concat(wrongV1).sort(function(){return Math.random()-0.5;});
        quizzes.push({type:"fillblank", question:blank1, hint:ex1.korean, options:opts2, answer:p1.verb, verb:p1.verb});
      }

      // Q3: listening quiz - TTS plays English, pick Korean meaning
      var listenEx = allExamples[Math.floor(Math.random() * allExamples.length)];
      var wrongKorean = allExamples.filter(function(e){return e.ex.korean !== listenEx.ex.korean;}).map(function(e){return e.ex.korean;});
      // Add some generic wrong Korean options
      var extraWrong = ["오늘 일찍 퇴근해야 해","그건 좀 어려울 것 같아","나 어제 많이 먹었어"];
      wrongKorean = wrongKorean.concat(extraWrong);
      var uniqueWrong = [];
      for (var wi = 0; wi < wrongKorean.length; wi++) {
        if (uniqueWrong.indexOf(wrongKorean[wi]) === -1 && wrongKorean[wi] !== listenEx.ex.korean) {
          uniqueWrong.push(wrongKorean[wi]);
        }
      }
      var listenOpts = [listenEx.ex.korean].concat(uniqueWrong.sort(function(){return Math.random()-0.5;}).slice(0,3)).sort(function(){return Math.random()-0.5;});
      quizzes.push({type:"listening", audio_text:listenEx.ex.english, options:listenOpts, answer:listenEx.ex.korean, verb:listenEx.verb});

      // Q4: meaning quiz for phrasal verb (same lesson set)
      var p2 = lessons[0].phrasal;
      var correctM2 = p2.meaning_ko.split(",")[0].trim();
      var opts4 = [correctM2].concat(wrongMeanings.filter(function(w){return w!==correctM2;}).sort(function(){return Math.random()-0.5;}).slice(0,3)).sort(function(){return Math.random()-0.5;});
      quizzes.push({type:"meaning", question:'"'+p2.verb+'" 의 뜻은?', options:opts4, answer:correctM2, verb:p2.verb});

      // Q5: arrange - sentence ordering
      var arrangeEx = allExamples[Math.floor(Math.random() * allExamples.length)];
      var arrangeWords = arrangeEx.ex.english.replace(/[.,!?]/g,"").split(" ");
      var shuffledWords = [].concat(arrangeWords).sort(function(){return Math.random()-0.5;});
      // Make sure shuffled is different from original
      var attempts = 0;
      while (shuffledWords.join(" ") === arrangeWords.join(" ") && attempts < 10) {
        shuffledWords = [].concat(arrangeWords).sort(function(){return Math.random()-0.5;});
        attempts++;
      }
      quizzes.push({type:"arrange", words:shuffledWords, answer:arrangeWords.join(" "), hint:arrangeEx.ex.korean, verb:arrangeEx.verb});

      // Q6: fill-blank for basic verb (different example)
      var b2 = lessons[0].basic;
      var ex6 = b2.examples[Math.min(1, b2.examples.length-1)];
      var blank6 = makeVerbBlank(ex6.english, b2.verb);
      if(blank6.indexOf("______")!==-1){
        var wrongV6 = ["get","make","take","put","go","come","keep","look","work","run","call","find"].filter(function(v){return v!==b2.verb;}).sort(function(){return Math.random()-0.5;}).slice(0,3);
        var opts6 = [b2.verb].concat(wrongV6).sort(function(){return Math.random()-0.5;});
        quizzes.push({type:"fillblank", question:blank6, hint:ex6.korean, options:opts6, answer:b2.verb, verb:b2.verb});
      }

      // Q7: situation quiz
      var sitEx = allExamples[Math.floor(Math.random() * allExamples.length)];
      var wrongEng = allExamples.filter(function(e){return e.ex.english !== sitEx.ex.english;}).map(function(e){return e.ex.english;});
      wrongEng = wrongEng.concat(wrongSentences);
      var uniqueWrongEng = [];
      for (var we = 0; we < wrongEng.length; we++) {
        if (uniqueWrongEng.indexOf(wrongEng[we]) === -1 && wrongEng[we] !== sitEx.ex.english) {
          uniqueWrongEng.push(wrongEng[we]);
        }
      }
      var sitOpts = [sitEx.ex.english].concat(uniqueWrongEng.sort(function(){return Math.random()-0.5;}).slice(0,3)).sort(function(){return Math.random()-0.5;});
      quizzes.push({type:"situation", question:'상황: "'+sitEx.ex.korean+'"\n"'+sitEx.verb+'" 을(를) 사용한 올바른 문장은?', options:sitOpts, answer:sitEx.ex.english, verb:sitEx.verb});

      // Add 1 weak verb review question if available
      var weakVerbs = getWeakVerbs();
      if (weakVerbs.length > 0) {
        var weakVerb = weakVerbs[Math.floor(Math.random() * weakVerbs.length)];
        // Find the verb in LESSON_POOL
        for (var lpi = 0; lpi < LESSON_POOL.length; lpi++) {
          var lp = LESSON_POOL[lpi];
          if (lp.basic.verb === weakVerb || lp.phrasal.verb === weakVerb) {
            var weakItem = lp.basic.verb === weakVerb ? lp.basic : lp.phrasal;
            var weakCorrect = weakItem.meaning_ko.split(",")[0].trim();
            var weakOpts = [weakCorrect].concat(wrongMeanings.filter(function(w){return w!==weakCorrect;}).sort(function(){return Math.random()-0.5;}).slice(0,3)).sort(function(){return Math.random()-0.5;});
            quizzes.push({type:"meaning", question:'[복습] "'+weakItem.verb+'" 의 뜻은?', options:weakOpts, answer:weakCorrect, verb:weakItem.verb, isReview:true});
            break;
          }
        }
      }

      return quizzes;
    }

    async function callClaude(system, user) {
      var xp = (load("xp_state")||{xp:0}).xp;
      var lv = getLevel(xp);
      var res = await fetch("/api/claude", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ system: system, user: user, level: lv.level }),
      });
      var data = await res.json();
      if (!res.ok) {
        if (data.remaining !== undefined) setAiRemaining(data.remaining);
        throw new Error(data.error || "AI 오류");
      }
      if (data.remaining !== undefined) setAiRemaining(data.remaining);
      return data.text || "";
    }

      var events = ["visit","lesson_start","lesson_done","reaction_good","reaction_mid","reaction_bad","feedback_click","login_attempt"];

      for (var di = 0; di < days.length; di++) {
        var day = days[di];
        result[day] = {};
        for (var ei = 0; ei < events.length; ei++) {
          result[day][events[ei]] = load("stat:" + day + ":" + events[ei]) || 0;
        }
      }
      return result;
    }

    // ── getTodayLesson: returns array of 1 lesson set (basic + phrasal) ──
    function getTodayLesson() {
      // 로그인한 사용자는 AI 생성 동사 풀도 포함
      var isLoggedIn = !!load("tk_state"); // tk_state는 로그인 시 저장됨
      var myPool = isLoggedIn ? (load("my_lesson_pool") || []) : [];
      var POOL = LESSON_POOL.concat(myPool);

      var encountered = isLoggedIn ? (load("my_encountered_verbs") || []) : [];
      var learnedDates = load("learned_lesson_dates") || {};
      var todayKey = (function(){var d=new Date();d.setHours(d.getHours()+9);return d.toISOString().slice(0,10);})();

      // 이미 오늘 정해진 레슨이 있으면 그대로
      if (learnedDates[todayKey]) {
        var lessons = learnedDates[todayKey].map(function(idx){return POOL[idx];}).filter(Boolean);
        if (lessons.length >= 1) return [lessons[0]];
      }

      // 회화에서 본 동사 중 POOL에 있는 것 찾기
      var matchedIndices = [];
      var encounteredVerbs = encountered.map(function(e){return e.verb.toLowerCase();});
      POOL.forEach(function(lp,i){
        if (lp.basic && encounteredVerbs.indexOf(lp.basic.verb.toLowerCase()) !== -1) matchedIndices.push(i);
        else if (lp.phrasal && encounteredVerbs.indexOf(lp.phrasal.verb.toLowerCase()) !== -1) matchedIndices.push(i);
      });

      var dayIndex = Math.floor(Date.now() / 86400000);
      var idx1, idx2;

      if (matchedIndices.length >= 1) {
        idx1 = matchedIndices[dayIndex % matchedIndices.length];
        idx2 = ((dayIndex + 1) * 2) % POOL.length;
        if (idx2 === idx1) idx2 = (idx2 + 1) % POOL.length;
      } else {
        idx1 = (dayIndex * 2) % POOL.length;
        idx2 = (dayIndex * 2 + 1) % POOL.length;
      }

      // 모든 풀 다 학습했는지 체크
      var allLearnedIndices = {};
      Object.values(learnedDates).forEach(function(arr){arr.forEach(function(i){allLearnedIndices[i]=true;});});
      var totalLearned = Object.keys(allLearnedIndices).length;

      if (totalLearned >= POOL.length) {
        var weakIndices = [];
        encountered.sort(function(a,b){return (b.count||1)-(a.count||1);}).forEach(function(e){
          POOL.forEach(function(lp,i){
            if (lp.basic && lp.basic.verb === e.verb.toLowerCase()) weakIndices.push(i);
            if (lp.phrasal && lp.phrasal.verb === e.verb.toLowerCase()) weakIndices.push(i);
          });
        });
        if (weakIndices.length >= 2) {
          idx1 = weakIndices[dayIndex % weakIndices.length];
          idx2 = weakIndices[(dayIndex+1) % weakIndices.length];
          if (idx1 === idx2) idx2 = (idx2+1) % POOL.length;
        }
      }

      learnedDates[todayKey] = [idx1];
      save("learned_lesson_dates", learnedDates);
      return [POOL[idx1]];
    }

    async function generateNewLesson(completedVerbs) {
      var system = 'You help Korean students learn American English. Generate a lesson with a basic verb AND a phrasal verb that shares the same root (e.g., get -> get over). NEVER use these already-learned verbs: ' + completedVerbs.join(", ") + '. Return ONLY valid JSON: {"basic":{"verb":"...","meaning_ko":"...","meaning_en":"...","meanings":[{"meaning":"","example":""}],"examples":[{"situation":"","english":"","korean":""}],"bad_example":"","bad_reason":"왜 어색한지 한국어 1문장","good_example":"","practice_hint":""},"phrasal":{"verb":"... (must share same root as basic verb)","meaning_ko":"...","meaning_en":"...","meanings":[],"examples":[{"situation":"","english":"","korean":""}],"bad_example":"","bad_reason":"왜 어색한지 한국어 1문장","good_example":"","practice_hint":""}}';
      var raw = await callClaude(system, "Generate today's lesson. Pick a common English verb not yet learned. The phrasal verb MUST share the same root verb. Focus on daily American English usage.");
      return JSON.parse(raw.replace(/```json|```/g,"").trim());
    }

    function LearnScreen(props) {

      // lessonSetIdx: 0 or 1 (which of the 2 sets)
      // phase: "basic" or "phrasal"
      var _s1=useState(0); var lessonSetIdx=_s1[0]; var setLessonSetIdx=_s1[1];
      var _s1b=useState("basic"); var phase=_s1b[0]; var setPhase=_s1b[1];
      var _s2=useState(0); var step=_s2[0]; var setStep=_s2[1];
      var _s3=useState(null); var quizzes=_s3[0]; var setQuizzes=_s3[1];

      var _s8=useState(false); var quizDone=_s8[0]; var setQuizDone=_s8[1];
      var _s9=useState(null); var xpPopup=_s9[0]; var setXpPopup=_s9[1];
      // For arrange quiz type

      var _sb=useState(false); var arrangeChecked=_sb[0]; var setArrangeChecked=_sb[1];

        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",gap:16}}>
          <div style={{fontSize:36}}>{"✨"}</div>
          <div style={{color:C.muted,fontSize:14}}>오늘의 레슨 준비 중...</div>
        </div>
      );
      if (!lessons || !lessons.length) return null;

      var lesson = lessons[lessonSetIdx];
      if (!lesson) return null;
      var current = phase==="basic" ? lesson.basic : lesson.phrasal;
      var color = phase==="basic" ? C.yellow : C.accent;

      // Progress label: set1 basic, set1 phrasal, set2 basic, set2 phrasal
      var totalPhases = lessons.length * 2; // 4 phases
      var currentPhaseNum = lessonSetIdx * 2 + (phase==="basic"?0:1);

      var showXpGain = function(amount) {
        setXpPopup("+"+amount+" XP");
        setTimeout(function(){setXpPopup(null);},1200);
      };

      var goPrev = function() {
        if (step>0) { setStep(function(s){return s-1;}); return; }
        if (phase==="phrasal") { setPhase("basic"); setStep(2); return; }
        if (lessonSetIdx>0) { setLessonSetIdx(function(i){return i-1;}); setPhase("phrasal"); setStep(2); return; }
      };
      var canGoPrev = step>0 || phase==="phrasal" || lessonSetIdx>0;

      var goNext = function() {
        if (step<2) {
          setStep(function(s){return s+1;});
          // 단순 진행 — XP 없음 (실력 안 늘었으니까)
          return;
        }
        if (phase==="basic") {
          setPhase("phrasal"); setStep(0);
          return;
        }
        if (lessonSetIdx < lessons.length - 1) {
          setLessonSetIdx(function(i){return i+1;});
          setPhase("basic"); setStep(0);
          return;
        }
        setQuizzes(generateQuiz(lessons));
        setQuizIdx(0); setSelected(null); setAnswered(false); setCorrectCount(0); setQuizDone(false);
        setArrangeSelected([]); setArrangeChecked(false);
        setStep(3);
      };

      var handleQuizAnswer = function(opt) {
        if (answered) return;
        setSelected(opt); setAnswered(true);
        var isCorrect = opt === quizzes[quizIdx].answer;
        if (isCorrect) {
          setCorrectCount(function(c){return c+1;});
          // 객관식 정답 = 5XP (쉬움)
          var r=addXP(5); showXpGain(5); if(onXP)onXP(r);
          if (quizzes[quizIdx].isReview) removeWeakVerb(quizzes[quizIdx].verb);
        } else {
          addWeakVerb(quizzes[quizIdx].verb);
          // 틀리면 XP 없음 — 다시 풀어야 함
        }
      };

      var handleArrangeCheck = function() {
        setArrangeChecked(true);
        var builtSentence = arrangeSelected.join(" ");
        var isCorrect = builtSentence.toLowerCase() === quizzes[quizIdx].answer.toLowerCase();
        setAnswered(true);
        if (isCorrect) {
          setCorrectCount(function(c){return c+1;});
          var r=addXP(15); showXpGain(15); if(onXP)onXP(r);
          if (quizzes[quizIdx].isReview) removeWeakVerb(quizzes[quizIdx].verb);
        } else {
          addWeakVerb(quizzes[quizIdx].verb);
          // 틀리면 XP 없음 — 다시 풀어야 함
        }
      };

      var handleListeningPlay = function() {
        if (quizzes && quizzes[quizIdx] && quizzes[quizIdx].audio_text) {
          speakEnglish(quizzes[quizIdx].audio_text);
        }

      var nextQuiz = function() {

          setArrangeSelected([]); setArrangeChecked(false);

              <div style={{fontSize:20,fontWeight:800,marginBottom:16}}>미국인이 실제로 쓰는 문장</div>
              {current.examples?.map(function(ex,i){return(
                <div key={i} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16,marginBottom:12}}>

                  <div style={{fontSize:15,color:C.text,fontWeight:600,marginBottom:6,lineHeight:1.5}}>{ex.english}</div>

                </div>
              );})}
            </div>
          )}

          {step===2&&(
            <div>
              <div style={{fontSize:11,color:C.muted,letterSpacing:3,marginBottom:12}}>SENTENCE PATTERN</div>
              <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16,marginBottom:12}}>
                <div style={{fontSize:12,color:C.red,marginBottom:8}}>{"❌ 어색해요"}</div>
                <div style={{fontSize:14,color:C.red,padding:"10px 12px",background:C.red+"10",borderRadius:8,fontStyle:"italic"}}>"{current.bad_example}"</div>
                {current.bad_reason&&<div style={{fontSize:12,color:C.muted,marginTop:6,lineHeight:1.5}}>{"→ "}{current.bad_reason}</div>}
              </div>
              <div style={{background:C.surface,border:"1px solid "+color+"40",borderRadius:12,padding:16,marginBottom:16}}>
                <div style={{fontSize:12,color:color,marginBottom:8}}>{"✅ 자연스러워요"}</div>
                <div style={{fontSize:14,color:C.text,padding:"10px 12px",background:color+"10",borderRadius:8,lineHeight:1.6}}>"{current.good_example}"</div>
              </div>
              {current.confuse_with&&(
                <div style={{background:C.orange+"10",border:"1px solid "+C.orange+"30",borderRadius:12,padding:14,marginBottom:20}}>
                  <div style={{fontSize:11,color:C.orange,letterSpacing:2,marginBottom:8}}>{"🔍 헷갈리는 동사 비교"}</div>
                  <div style={{display:"flex",gap:6,marginBottom:6}}>
                    <span style={{color:color,fontWeight:800,fontSize:15}}>{current.verb}</span>
                    <span style={{color:C.muted,fontSize:13}}>vs</span>
                    <span style={{color:C.orange,fontWeight:800,fontSize:15}}>{current.confuse_with.verb}</span>
                  </div>
                  <div style={{fontSize:13,color:C.text,lineHeight:1.6,marginBottom:8}}>{current.confuse_with.diff_ko}</div>
                  <div style={{display:"flex",gap:8,flexDirection:"column"}}>
                    <div onClick={function(e){speakEnglish(current.confuse_with.example_this,e.currentTarget);}} style={{fontSize:12,color:color,cursor:"pointer",background:color+"10",borderRadius:8,padding:"8px 10px"}}>{"🔊 "}{current.verb}: "{current.confuse_with.example_this}"</div>
                    <div onClick={function(e){speakEnglish(current.confuse_with.example_other,e.currentTarget);}} style={{fontSize:12,color:C.orange,cursor:"pointer",background:C.orange+"10",borderRadius:8,padding:"8px 10px"}}>{"🔊 "}{current.confuse_with.verb}: "{current.confuse_with.example_other}"</div>
                  </div>
                </div>
              )}
            </div>
          )}

          {step===3&&quizzes&&!quizDone&&(
            <div>
              <div style={{fontSize:11,color:C.accent,letterSpacing:3,marginBottom:6}}>QUIZ</div>
              <div style={{display:"flex",gap:5,marginBottom:16}}>
                {quizzes.map(function(_,i){return(
                  <div key={i} style={{flex:1,height:3,borderRadius:99,background:i<=quizIdx?C.accent:C.border,transition:"background 0.3s"}}/>
                );})}
              </div>

              {/* LISTENING type */}
              {quizzes[quizIdx].type==="listening"&&(
                <div>
                  <div style={{fontSize:14,color:C.muted,marginBottom:8}}>듣고 올바른 뜻을 고르세요</div>
                  <button onClick={handleListeningPlay} style={{background:C.blue+"20",border:"1px solid "+C.blue+"60",borderRadius:12,padding:"16px 24px",cursor:"pointer",marginBottom:16,display:"flex",alignItems:"center",gap:10,width:"100%",justifyContent:"center"}}>
                    <span style={{fontSize:24}}>{"🔊"}</span>
                    <span style={{fontSize:15,fontWeight:700,color:C.blue}}>들어보기</span>
                  </button>
                  {answered&&(
                    <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:12,marginBottom:12}}>
                      <div style={{fontSize:12,color:C.muted,marginBottom:4}}>원문:</div>
                      <div style={{fontSize:14,color:C.text,fontWeight:600}}>{quizzes[quizIdx].audio_text}</div>
                    </div>
                  )}
                  {quizzes[quizIdx].options.map(function(opt,i){
                    var isCorrect = opt===quizzes[quizIdx].answer;
                    var isSelected = opt===selected;
                    var bg = !answered?C.surface : isCorrect?C.accent+"20" : isSelected?C.red+"20":C.surface;
                    var border = !answered?C.border : isCorrect?C.accent+"60" : isSelected?C.red+"60":C.border;
                    var textColor = !answered?C.text : isCorrect?C.accent : isSelected?C.red:C.muted;
                    return (
                      <div key={i} onClick={function(){handleQuizAnswer(opt);}}
                        style={{background:bg,border:"1px solid "+border,borderRadius:12,padding:"14px 16px",marginBottom:8,cursor:answered?"default":"pointer",
                          animation:answered&&isSelected&&!isCorrect?"wrongShake 0.4s":"none"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div style={{fontSize:15,fontWeight:600,color:textColor}}>{opt}</div>
                          {answered&&isCorrect&&<span style={{color:C.accent,fontSize:16}}>{"✓"}</span>}
                          {answered&&isSelected&&!isCorrect&&<span style={{color:C.red,fontSize:16}}>{"✗"}</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* ARRANGE type */}
              {quizzes[quizIdx].type==="arrange"&&(
                <div>
                  <div style={{fontSize:14,color:C.muted,marginBottom:8}}>단어를 올바른 순서로 배열하세요</div>
                  {quizzes[quizIdx].hint&&<div style={{fontSize:13,color:C.muted,marginBottom:12}}>{quizzes[quizIdx].hint}</div>}

                  {/* Built sentence area */}
                  <div style={{background:C.surface,border:"1px solid "+(arrangeChecked?(arrangeSelected.join(" ").toLowerCase()===quizzes[quizIdx].answer.toLowerCase()?C.accent+"60":C.red+"60"):C.border),borderRadius:12,padding:16,marginBottom:16,minHeight:50}}>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",minHeight:32}}>
                      {arrangeSelected.length===0&&<span style={{color:C.muted,fontSize:13}}>여기에 단어가 표시됩니다</span>}
                      {arrangeSelected.map(function(w,i){return(
                        <button key={i} onClick={function(){if(arrangeChecked)return;setArrangeSelected(function(prev){var n=[].concat(prev);n.splice(i,1);return n;});}}
                          style={{background:C.accent+"20",border:"1px solid "+C.accent+"40",color:C.accent,borderRadius:8,padding:"6px 12px",fontSize:14,fontWeight:600,cursor:arrangeChecked?"default":"pointer"}}>
                          {w}
                        </button>
                      );})}
                    </div>
                  </div>

                  {/* Word chips */}
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
                    {quizzes[quizIdx].words.map(function(w,i){
                      var usedCount = 0;
                      for (var ui = 0; ui < arrangeSelected.length; ui++) {
                        if (arrangeSelected[ui] === w) usedCount++;
                      }
                      var availCount = 0;
                      for (var ai = 0; ai < quizzes[quizIdx].words.length; ai++) {
                        if (ai <= i && quizzes[quizIdx].words[ai] === w) availCount++;
                      }
                      // Check how many times this word appears at this index or before
                      var totalInWords = quizzes[quizIdx].words.filter(function(ww){return ww===w;}).length;
                      var usedTotal = arrangeSelected.filter(function(ww){return ww===w;}).length;
                      var isUsed = usedTotal >= totalInWords;
                      // Simpler: track by index
                      var usedIndices = [];
                      var tempSelected = [].concat(arrangeSelected);
                      for (var ti = 0; ti < quizzes[quizIdx].words.length; ti++) {
                        var idx = tempSelected.indexOf(quizzes[quizIdx].words[ti]);
                        if (idx !== -1) { usedIndices.push(ti); tempSelected.splice(idx, 1); }
                      }
                      var thisUsed = usedIndices.indexOf(i) !== -1;

                      return(
                        <button key={i} onClick={function(){if(arrangeChecked||thisUsed)return;setArrangeSelected(function(prev){return [].concat(prev,[w]);});}}
                          style={{background:thisUsed?C.border:C.surface,border:"1px solid "+C.border,color:thisUsed?C.muted:C.text,borderRadius:8,padding:"8px 14px",fontSize:14,fontWeight:600,cursor:arrangeChecked||thisUsed?"default":"pointer",opacity:thisUsed?0.4:1}}>
                          {w}
                        </button>
                      );
                    })}
                  </div>

                  {!arrangeChecked&&(
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={function(){setArrangeSelected([]);}} style={{flex:1,background:C.surface,border:"1px solid "+C.border,color:C.muted,borderRadius:12,padding:14,fontSize:14,fontWeight:600,cursor:"pointer"}}>초기화</button>
                      <button onClick={handleArrangeCheck} disabled={arrangeSelected.length===0} style={{flex:2,background:arrangeSelected.length>0?C.accent:C.border,color:arrangeSelected.length>0?"#08090d":C.muted,border:"none",borderRadius:12,padding:14,fontSize:14,fontWeight:800,cursor:"pointer"}}>확인</button>
                    </div>
                  )}
                  {arrangeChecked&&(
                    <div>
                      <div style={{fontSize:14,fontWeight:700,color:arrangeSelected.join(" ").toLowerCase()===quizzes[quizIdx].answer.toLowerCase()?C.accent:C.red,marginBottom:8}}>
                        {arrangeSelected.join(" ").toLowerCase()===quizzes[quizIdx].answer.toLowerCase()?"정답!":"오답!"}
                      </div>
                      {arrangeSelected.join(" ").toLowerCase()!==quizzes[quizIdx].answer.toLowerCase()&&(
                        <div style={{fontSize:13,color:C.muted,marginBottom:8}}>정답: {quizzes[quizIdx].answer}</div>
                      )}
                    </div>
                  )}
                </div>
              )}

              {/* STANDARD types: meaning, fillblank, translate, situation */}
              {quizzes[quizIdx].type!=="listening"&&quizzes[quizIdx].type!=="arrange"&&(
                <div>
                  <div style={{fontSize:18,fontWeight:800,marginBottom:6,lineHeight:1.4,whiteSpace:"pre-line"}}>{quizzes[quizIdx].question}</div>
                  {quizzes[quizIdx].hint&&<div style={{fontSize:13,color:C.muted,marginBottom:16}}>{quizzes[quizIdx].hint}</div>}
                  {quizzes[quizIdx].options.map(function(opt,i){
                    var isCorrect = opt===quizzes[quizIdx].answer;
                    var isSelected = opt===selected;
                    var bg = !answered?C.surface : isCorrect?C.accent+"20" : isSelected?C.red+"20":C.surface;
                    var border = !answered?C.border : isCorrect?C.accent+"60" : isSelected?C.red+"60":C.border;
                    var textColor = !answered?C.text : isCorrect?C.accent : isSelected?C.red:C.muted;
                    return (
                      <div key={i} onClick={function(){handleQuizAnswer(opt);}}
                        style={{background:bg,border:"1px solid "+border,borderRadius:12,padding:"14px 16px",marginBottom:8,cursor:answered?"default":"pointer",
                          animation:answered&&isSelected&&!isCorrect?"wrongShake 0.4s":"none"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div style={{fontSize:15,fontWeight:600,color:textColor}}>{opt}</div>
                          {answered&&isCorrect&&<span style={{color:C.accent,fontSize:16}}>{"✓"}</span>}
                          {answered&&isSelected&&!isCorrect&&<span style={{color:C.red,fontSize:16}}>{"✗"}</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {(answered||arrangeChecked)&&(
                <button onClick={nextQuiz} style={{width:"100%",background:C.accent,color:"#08090d",border:"none",borderRadius:14,padding:16,fontSize:15,fontWeight:800,cursor:"pointer",marginTop:8}}>
                  {quizIdx<quizzes.length-1?"다음 문제 →":"결과 보기 →"}
                </button>
              )}
            </div>
          )}

          {step===3&&quizDone&&(
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:64,marginBottom:12}}>{correctCount===quizzes.length?"🎉":"👏"}</div>
              <div style={{fontSize:24,fontWeight:900,marginBottom:8}}>{correctCount}/{quizzes.length} 정답!</div>
              <div style={{fontSize:14,color:C.muted,marginBottom:8}}>
                {correctCount===quizzes.length?"퍼펙트! 보너스 +30 XP":"잘했어요! 다음엔 더 잘할 수 있어요"}
              </div>
              <div style={{display:"flex",justifyContent:"center",gap:12,marginBottom:24}}>
                <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:"10px 16px"}}>
                  <div style={{fontSize:20,fontWeight:800,color:C.accent}}>{getXP()}</div>
                  <div style={{fontSize:10,color:C.muted}}>Total XP</div>
                </div>
                <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:"10px 16px"}}>
                  <div style={{fontSize:20,fontWeight:800,color:C.yellow}}>Lv.{getLevel(getXP()).level}</div>
                  <div style={{fontSize:10,color:C.muted}}>{getLevel(getXP()).name}</div>
                </div>
              </div>
              <button onClick={onNext} style={{width:"100%",background:C.accent,color:"#08090d",border:"none",borderRadius:14,padding:16,fontSize:15,fontWeight:800,cursor:"pointer"}}>
                {aiAvailable?"롤플레이 하러 가기 →":"오늘 학습 완료"}
              </button>
            </div>
          )}

          {step<3&&(
            <div style={{display:"flex",gap:8}}>
              {canGoPrev&&<button onClick={goPrev} style={{flex:0,padding:"16px 20px",background:C.surface,border:"1px solid "+C.border,borderRadius:14,fontSize:15,fontWeight:800,cursor:"pointer",color:C.muted}}>{"←"}</button>}
              <button onClick={goNext} style={{flex:1,background:color,color:"#08090d",border:"none",borderRadius:14,padding:16,fontSize:15,fontWeight:800,cursor:"pointer"}}>
                {btnLabel}
              </button>
            </div>
          )}

          {xpPopup&&(
            <div style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",background:C.accent,color:"#08090d",padding:"8px 20px",borderRadius:99,fontSize:16,fontWeight:800,animation:"xpPop 1.2s forwards",zIndex:100}}>
              {xpPopup}
            </div>
          )}
        </div>
      );
    }

    // ── ROLEPLAY ────────────────────────────────────────────────────
    function RoleplayScreen(props) {
      var lessons=props.lessons, onNext=props.onNext;
      var _s1=useState(null); var situation=_s1[0]; var setSituation=_s1[1];
      var _s2=useState(true); var isLoading=_s2[0]; var setIsLoading=_s2[1];
      var _s3=useState(""); var userResponse=_s3[0]; var setUserResponse=_s3[1];
      var _s4=useState(null); var evaluation=_s4[0]; var setEvaluation=_s4[1];
      var _s5=useState(false); var evalLoading=_s5[0]; var setEvalLoading=_s5[1];

      var allVerbs = [];
      for (var li = 0; li < lessons.length; li++) {
        allVerbs.push(lessons[li].basic.verb);
        allVerbs.push(lessons[li].phrasal.verb);
      }

      useEffect(function(){
        var system = 'Create a realistic everyday situation for English practice. The student should use these verbs: [' + allVerbs.join(", ") + ']. Return ONLY valid JSON:\n{"situation_ko":"카페에서 음료 주문하기","context_en":"You are at a coffee shop ordering a drink.","starter":"Hi! What can I get for you today?","target_verbs":' + JSON.stringify(allVerbs) + '}';
        callClaude(system, 'Generate an everyday roleplay situation using these verbs: ' + allVerbs.join(", ") + '. Make it feel natural and conversational.')
        .then(function(raw){
          var parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
          setSituation(parsed);
        }).catch(function(){
          setSituation({situation_ko:"카페에서 친구와 대화하기",context_en:"You run into a friend at a coffee shop. They ask how you've been.",starter:"Hey! Long time no see! How have you been?",target_verbs:allVerbs});
        }).finally(function(){setIsLoading(false);});
      }, []);

      var handleSubmit = function() {
        if (!userResponse.trim()) return;
        setEvalLoading(true);
        var system = 'Evaluate this English roleplay response. Situation: ' + situation.context_en + '. Starter: "' + situation.starter + '". Student responded: "' + userResponse + '". Target verbs: ' + JSON.stringify(allVerbs) + '.\nReturn ONLY valid JSON:\n{"score":3,"feedback":"한국어 피드백 2문장","corrected":"자연스러운 버전","used_verbs":["get"],"missed_verbs":["get over"]}';
        callClaude(system, 'Evaluate: "' + userResponse + '"')
        .then(function(raw){
          var parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
          setEvaluation(parsed);
        }).catch(function(){
          setEvaluation({score:3,feedback:"평가를 가져오지 못했어요. 하지만 시도한 것만으로도 훌륭해요!",corrected:userResponse,used_verbs:[],missed_verbs:[]});
        }).finally(function(){setEvalLoading(false);});
      };

      if (isLoading) return (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",gap:16}}>
          <div style={{fontSize:36}}>{"🎭"}</div>
          <div style={{color:C.muted,fontSize:14}}>롤플레이 상황 생성 중...</div>
        </div>
      );

      return (
        <div style={{padding:"24px 20px"}}>
          <div style={{fontSize:11,color:C.orange,letterSpacing:3,marginBottom:6}}>ROLEPLAY</div>
          <div style={{fontSize:22,fontWeight:800,marginBottom:16}}>상황 롤플레이</div>

          {situation&&(
            <div>
              <div style={{background:C.surface,border:"1px solid "+C.orange+"40",borderRadius:12,padding:16,marginBottom:12}}>
                <div style={{fontSize:11,color:C.orange,letterSpacing:2,marginBottom:8}}>상황</div>
                <div style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:6}}>{situation.situation_ko}</div>
                <div style={{fontSize:13,color:C.muted,lineHeight:1.6}}>{situation.context_en}</div>
              </div>

              <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16,marginBottom:12}}>
                <div style={{fontSize:11,color:C.muted,letterSpacing:2,marginBottom:6}}>사용할 동사</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {allVerbs.map(function(v,i){return(
                    <span key={i} style={{background:C.accent+"20",color:C.accent,padding:"4px 10px",borderRadius:8,fontSize:13,fontWeight:700}}>{v}</span>
                  );})}
                </div>
              </div>

              <div style={{background:C.blue+"10",border:"1px solid "+C.blue+"30",borderRadius:12,padding:14,marginBottom:16}}>
                <div style={{fontSize:11,color:C.blue,marginBottom:6}}>AI</div>
                <div style={{fontSize:15,color:C.text,lineHeight:1.6}}>"{situation.starter}"</div>
              </div>

              {!evaluation&&(
                <div>
                  <textarea value={userResponse} onChange={function(e){setUserResponse(e.target.value);}}
                    rows={4} placeholder={"영어로 대답해보세요! 위의 동사들을 사용해보세요."} style={{width:"100%",background:C.surface,border:"1px solid "+(userResponse.trim()?C.accent+"60":C.border),borderRadius:12,padding:14,color:C.text,fontSize:14,lineHeight:1.6,resize:"none",outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}
                  />
                  <button onClick={handleSubmit} disabled={evalLoading||!userResponse.trim()} style={{width:"100%",marginTop:10,background:userResponse.trim()?C.orange:C.border,color:userResponse.trim()?"#08090d":C.muted,border:"none",borderRadius:14,padding:16,fontSize:15,fontWeight:800,cursor:"pointer"}}>
                    {evalLoading?"평가 중...":"제출하기 →"}
                  </button>
                </div>
              )}

              {evaluation&&(
                <div>
                  <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16,marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <div style={{fontSize:11,color:C.orange,letterSpacing:2}}>평가</div>
                      <div style={{fontSize:18}}>{Array(evaluation.score||0).fill("★").join("")}{Array(5-(evaluation.score||0)).fill("☆").join("")}</div>
                    </div>
                    <div style={{fontSize:14,color:C.text,lineHeight:1.7,marginBottom:10}}>{evaluation.feedback}</div>
                    {evaluation.corrected&&evaluation.corrected!==userResponse&&(
                      <div style={{background:C.accent+"10",border:"1px solid "+C.accent+"30",borderRadius:8,padding:12,marginBottom:8}}>
                        <div style={{fontSize:11,color:C.accent,marginBottom:4}}>자연스러운 버전</div>
                        <div style={{fontSize:14,color:C.text,lineHeight:1.5}}>"{evaluation.corrected}"</div>
                      </div>
                    )}
                    {evaluation.used_verbs&&evaluation.used_verbs.length>0&&(
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
                        <span style={{fontSize:11,color:C.muted}}>사용한 동사:</span>
                        {evaluation.used_verbs.map(function(v,i){return(
                          <span key={i} style={{background:C.accent+"20",color:C.accent,padding:"2px 8px",borderRadius:6,fontSize:12,fontWeight:700}}>{v}</span>
                        );})}
                      </div>
                    )}
                    {evaluation.missed_verbs&&evaluation.missed_verbs.length>0&&(
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        <span style={{fontSize:11,color:C.muted}}>놓친 동사:</span>
                        {evaluation.missed_verbs.map(function(v,i){return(
                          <span key={i} style={{background:C.red+"20",color:C.red,padding:"2px 8px",borderRadius:6,fontSize:12,fontWeight:700}}>{v}</span>
                        );})}
                      </div>
                    )}
                  </div>
                  <button onClick={onNext} style={{width:"100%",background:C.accent,color:"#08090d",border:"none",borderRadius:14,padding:16,fontSize:15,fontWeight:800,cursor:"pointer"}}>
                    {"다음 →"}
                  </button>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── PRACTICE ────────────────────────────────────────────────────
    function PracticeScreen(props) {

      function splitSegments(text) {
        var lines = text.split("\n").filter(function(l){return l.trim();});
        if (lines.length <= 1) {
          var sentences = text.split(/(?<=[.!?])\s+/).filter(function(s){return s.trim();});
          lines = sentences.length > 1 ? sentences : [text];
        }
        // 짧으면 1개로
        if (lines.length <= 6) return [lines.join("\n")];
        // 균등 분할: 목표 구간당 5줄, 총 구간 수 계산 후 균등 배분
        var targetPerSeg = 5;
        var numSegs = Math.max(1, Math.round(lines.length / targetPerSeg));
        var baseSize = Math.floor(lines.length / numSegs);
        var extra = lines.length % numSegs;
        var segs = []; var idx = 0;
        for (var s = 0; s < numSegs; s++) {
          var size = baseSize + (s < extra ? 1 : 0);
          segs.push(lines.slice(idx, idx + size).join("\n"));
          idx += size;
        }
        return segs;
      }

ey_verbs or in verbs_used. They are too basic to learn.\n- When wrapping contractions like they\'re, don\'t, isn\'t — show the FULL form in verbs_used (e.g. "are" not "\'re", "do not" not "don\'t"). But in the english text keep the natural contraction.\n- Pick 3-5 useful nouns\n\nReturn ONLY valid JSON:\n{"scenario":"상황 한줄 요약 (한국어)","speakers":1,"turns":[{"speaker":"화자1","original":"He **unanswered** many **questions relating to** his work.","english":"I **got** your text and **gave up** waiting.","korean":"문자 받고 기다리는 거 포기했어.","verbs_used":[{"verb":"get","type":"basic","usage":"받다"},{"verb":"give up","type":"phrasal","usage":"포기하다"}]}],"key_verbs":[{"verb":"get","type":"basic","meaning":"의미","example":"I got your text"},{"verb":"give up","type":"phrasal","meaning":"의미","example":"I gave up"}],"key_nouns":[{"noun":"deadline","meaning_ko":"마감 기한","example":"The deadline is tomorrow."}],"verb_compare":[{"verbs":["say","tell","talk"],"diff_ko":"say=말하다(내용), tell=전하다(대상 필요), talk=대화하다(상호)","examples":["I said sorry","I told him sorry","We talked about it"]}],"coach_tip":"핵심 포인트 한국어 2문장"}\n\nFor verb_compare: pick 1-2 groups of similar verbs that appeared in this conversation and explain the difference in Korean. Only include verbs that Korean speakers commonly confuse.';

      },[]);

      // 레벨업 감지 (전역 hook)
      useEffect(function(){

      useEffect(function(){
        if (!user) return;
        (async function(){
          var cloudState = await loadCloud(user.uid, "tk_state");
          if (cloudState) {
            setStreak(cloudState.streak||0);
            setVerbHistory(cloudState.history||[]);
            if (cloudState.todayKey===todayKey()) { setTodayDone(cloudState.todayDone||false); if(cloudState.lessons)setLessons(cloudState.lessons); }
            saveLocal("tk_state", cloudState);

            var localState = loadLocal("tk_state");

              setVerbHistory(localState.history||[]);
              if (localState.todayKey===todayKey()) { setTodayDone(localState.todayDone||false); if(localState.lessons)setLessons(localState.lessons); }
            }
          }
          if (!lessons) setLessons(getTodayLesson());

          var cloudSpeak = await loadCloud(user.uid, "speak_history");
          if (cloudSpeak) setSpeakHistory(cloudSpeak);
          else {
            var localSpeak = loadLocal("speak_history");
            if (localSpeak) { setSpeakHistory(localSpeak); await saveCloud(user.uid, "speak_history", localSpeak); }
          }

          var cloudXp = await loadCloud(user.uid, "xp_state");
          if (cloudXp) saveLocal("xp_state", cloudXp);

            var localXp = loadLocal("xp_state");
            if (localXp) await saveCloud(user.uid, "xp_state", localXp);
          }
        })();
      }, [user]);

      useEffect(function(){
        track("visit");
        // 출석 보너스는 훈련 완료 시에만 (handleComplete 또는 회화 완료 시)
        var s = loadLocal("tk_state");
        if (s) {
          setStreak(s.streak||0);
          setVerbHistory(s.history||[]);
          if (s.todayKey===todayKey()) { setTodayDone(s.todayDone||false); if(s.lessons)setLessons(s.lessons); }
        }
        if (!lessons) setLessons(getTodayLesson());
        setSpeakHistory(loadLocal("speak_history") || []);
      }, []);

      var persist = function(updates) {
        var cur = loadLocal("tk_state")||{};
        for(var k in updates) cur[k]=updates[k];
        cur.todayKey = todayKey();
        saveLocal("tk_state", cur);
        if (user) saveCloud(user.uid, "tk_state", cur);
      };

            allVerbs.push(lessons[li].basic.verb);

          }

        var newHistory = [].concat(verbHistory,[{verbs:allVerbs,date:todayKey()}]);
        saveLocal("verb_done_"+todayKey(), true);
        var speakDone = loadLocal("speak_done_"+todayKey());
        var fullyDone = !!speakDone;
        var newStreak = fullyDone ? streak+1 : streak;
        setStreak(newStreak); setTodayDone(fullyDone); setVerbHistory(newHistory);
        persist({streak:newStreak,todayDone:fullyDone,history:newHistory,lessons:lessons});
        // 레슨 완료 칭찬
        showPraise({type:"lesson", bonus:0});
        // 둘 다 완료 시 출석 보너스

          }
        }
        if (user) {
          var xpState = loadLocal("xp_state");
          if (xpState) saveCloud(user.uid, "xp_state", xpState);
          updateLeaderboard(user.uid, user.displayName);
        }
        setScreen("home"); setTab("home");
      };

      // 온보딩 — hooks는 모든 조건부 return 전에 선언
      var _onboard = useState(true); var showOnboarding = _onboard[0]; var setShowOnboarding = _onboard[1];
      // 로그인 유저가 이미 봤으면 자동 닫기
      useEffect(function(){
        if (user && loadLocal("onboarding_done")==="v2") setShowOnboarding(false);
      }, [user]);
      var _onboardStep = useState(0); var onboardStep = _onboardStep[0]; var setOnboardStep = _onboardStep[1];

      if (authLoading) return (
        <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:C.bg,color:C.text,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:12}}>{"💪"}</div>
            <div style={{color:C.muted,fontSize:14}}>{"로딩 중..."}</div>
          </div>
        </div>
      );

      if (!user&&!isGuest) return <LoginScreen onLogin={handleLogin} loading={loginLoading} onGuest={function(){
        // 게스트 진입 시 이전 로그인 유저의 로컬 데이터 클리어
        var keys=Object.keys(localStorage).filter(function(k){return k.startsWith("tf_")&&k!=="tf_is_guest"&&k!=="tf_theme"&&k!=="tf_font_size"&&k!=="tf_onboarding_done";});
        keys.forEach(function(k){localStorage.removeItem(k);});
        setIsGuest(true);saveLocal("is_guest",true);setStreak(0);setTodayDone(false);setLessons(getTodayLesson());setVerbHistory([]);setSpeakHistory([]);
      }} />;
      if (showOnboarding) {
        var steps = [
          {emoji:"😤",title:"다른 사람 대화 외워도\n내 말은 영어로 못 한다",lines:["그래서 만들었습니다"]},
          {emoji:"💡",title:"내가 하는 말을 녹음하면\n원어민 표현으로 바꿔줘요",lines:["카톡 대화도, 혼잣말도 OK","쉬운 동사만으로 다 말한다"]},
          {emoji:"🚀",title:"하루 15분이면 충분해요",lines:["동사 레슨 + 내 대화 영어 변환","무료. 앱 설치 없음. 지금 바로"]}
        ];
        var s = steps[onboardStep];
        return (
          <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:C.bg,color:C.text,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px"}}>
            <div style={{fontSize:64,marginBottom:16}}>{s.emoji}</div>
            <div style={{fontSize:22,fontWeight:900,marginBottom:16,textAlign:"center",lineHeight:1.3}}>{s.title}</div>
            <div style={{marginBottom:32,textAlign:"center"}}>
              {s.lines.map(function(l,i){return <div key={i} style={{fontSize:14,color:C.muted,lineHeight:2}}>{l}</div>;})}
            </div>
            <div style={{display:"flex",gap:6,marginBottom:24}}>
              {steps.map(function(_,i){return <div key={i} style={{width:i===onboardStep?20:8,height:8,borderRadius:4,background:i===onboardStep?C.accent:C.border,transition:"width 0.3s"}}/>;}) }
            </div>
            {onboardStep < steps.length - 1 ? (
              <button onClick={function(){setOnboardStep(onboardStep+1);}} style={{width:"100%",background:C.accent,color:"#08090d",border:"none",borderRadius:14,padding:16,fontSize:15,fontWeight:800,cursor:"pointer",marginBottom:10}}>{"다음 →"}</button>
            ) : (
              <button onClick={function(){setShowOnboarding(false);if(user)saveLocal("onboarding_done","v2");}} style={{width:"100%",background:C.accent,color:"#08090d",border:"none",borderRadius:14,padding:16,fontSize:15,fontWeight:800,cursor:"pointer",marginBottom:10}}>{"시작하기! 🚀"}</button>
            )}
            {onboardStep < steps.length - 1 && (
              <button onClick={function(){setShowOnboarding(false);if(user)saveLocal("onboarding_done","v2");}} style={{background:"none",border:"none",color:C.muted,fontSize:12,cursor:"pointer"}}>{"건너뛰기"}</button>
            )}
          </div>
        );
      }

      function TabIcon(props){
        var c=props.color;var s=props.type;
        if(s==="home")return React.createElement("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:c,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},React.createElement("path",{d:"M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"}));
        if(s==="speak")return React.createElement("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:c,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},React.createElement("path",{d:"M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"}));
        if(s==="review")return React.createElement("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:c,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},React.createElement("polyline",{points:"1 4 1 10 7 10"}),React.createElement("path",{d:"M3.51 15a9 9 0 102.13-9.36L1 10"}));
        if(s==="history")return React.createElement("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:c,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},React.createElement("path",{d:"M4 19.5A2.5 2.5 0 016.5 17H20"}),React.createElement("path",{d:"M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"}));
        return null;
      }
      var TABS = [
        {id:"home",type:"home",label:"홈"},
        {id:"speak",type:"speak",label:"회화"},
        {id:"review",type:"review",label:"복습"},
        {id:"history",type:"history",label:"기록"},
      ];

      return (
        <div data-app-root style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:C.bg,color:C.text,display:"flex",flexDirection:"column",zoom:(function(){var fs=load("font_size")||"normal";return fs==="large"?1.15:(fs==="small"?0.88:1);})()}}>
          <div style={{position:"sticky",top:0,zIndex:10,background:C.bg+"ee",backdropFilter:"blur(12px)",borderBottom:"1px solid "+C.border,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontWeight:900,fontSize:16,letterSpacing:-0.5,display:"flex",alignItems:"center",gap:8}}>
              {React.createElement("svg",{width:24,height:24,viewBox:"0 0 512 512"},
                React.createElement("rect",{width:512,height:512,rx:112,fill:"#111827"}),
                React.createElement("path",{d:"M140 140 h232 a40 40 0 0 1 40 40 v140 a40 40 0 0 1 -40 40 h-140 l-60 50 v-50 h-32 a40 40 0 0 1 -40 -40 v-140 a40 40 0 0 1 40 -40z",fill:"none",stroke:"#7ee8a2",strokeWidth:16,strokeLinejoin:"round"}),
                React.createElement("text",{x:256,y:300,textAnchor:"middle",fontFamily:"Arial",fontWeight:900,fontSize:160,fill:"#7ee8a2"},"T"),
                React.createElement("circle",{cx:370,cy:170,r:14,fill:"#fbbf24"})
              )}
              <span style={{color:C.accent}}>{"TalkFit"}</span>
            </div>
            {(screen==="learn"||screen==="practice"||screen==="admin"||screen==="speak"||screen==="roleplay"||screen==="chat"||screen==="settings")&&(
              <button onClick={function(){setScreen("home");setTab("home");}} style={{background:C.surface,border:"1px solid "+C.border,color:C.text,borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
                {React.createElement("svg",{width:14,height:14,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2.5,strokeLinecap:"round",strokeLinejoin:"round"},React.createElement("polyline",{points:"15 18 9 12 15 6"}))}
                {"홈"}
              </button>
            )}
            {screen==="home"&&(
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {isGuest&&!user&&(
                  <button onClick={function(){setIsGuest(false);saveLocal("is_guest",false);}} style={{background:C.accent+"20",border:"1px solid "+C.accent+"40",color:C.accent,borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{"로그인"}</button>
                )}
                {isAdmin && <button onClick={function(){setScreen("admin");}} style={{background:C.yellowDim,border:"1px solid "+C.yellow+"40",color:C.yellow,borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer",fontWeight:700}}>{"📊"}</button>}
                <div style={{fontSize:10,color:aiLeft<=5?C.red:C.muted,background:aiLeft<=5?C.red+"15":C.surface,border:"1px solid "+(aiLeft<=5?C.red+"40":C.border),borderRadius:6,padding:"2px 6px"}}>{"AI "+aiLeft}</div>
                <div style={{fontSize:12,color:C.muted}}>{streak}{"🔥"}</div>
                <button onClick={function(){setScreen("settings");}} style={{background:"none",border:"none",color:C.muted,padding:"6px",cursor:"pointer"}}>
                  {React.createElement("svg",{width:20,height:20,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},
                    React.createElement("circle",{cx:12,cy:12,r:3}),
                    React.createElement("path",{d:"M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"})
                  )}
                </button>
              </div>
            )}
          </div>

          <div data-scroller style={{flex:1,overflowY:"auto",paddingBottom:120}}>
            {screen==="home"&&<HomeScreen streak={streak} todayDone={todayDone} lessons={lessons} onStart={handleStart} onSpeak={function(){setScreen("speak");setTab("speak");}} onChat={function(){setScreen("chat");}} lbData={lbData} userId={user?user.uid:null}/>}
            {screen==="learn"&&<LearnScreen lessons={lessons} loading={loading} onNext={function(){setScreen("roleplay");}} aiAvailable={aiAvailable}/>}
            {screen==="roleplay"&&<RoleplayScreen lessons={lessons} onNext={function(){setScreen("practice");}}/>}
            {screen==="practice"&&<PracticeScreen lessons={lessons} onComplete={handleComplete} aiAvailable={aiAvailable}/>}
            {screen==="review"&&<ReviewScreen lessons={lessons} speakHistory={speakHistory} setSpeakHistory={function(h){setSpeakHistory(h);saveLocal("speak_history",h);if(user)saveCloud(user.uid,"speak_history",h);}}/>}
            {screen==="history"&&<HistoryScreen history={verbHistory} lbData={lbData} userId={user?user.uid:null}/>}
            <div style={{display:screen==="speak"?"block":"none"}}><SpeakScreen history={speakHistory} setHistory={function(h){setSpeakHistory(h);saveLocal("speak_history",h);if(user)saveCloud(user.uid,"speak_history",h);}} onHome={function(){setScreen("home");setTab("home");}} aiAvailable={aiAvailable}/></div>
            {screen==="chat"&&<ChatScreen onHome={function(){setScreen("home");setTab("home");}}/>}
            {screen==="admin"&&<AdminScreen/>}
            {screen==="settings"&&<SettingsScreen onClose={function(){setScreen("home");setTab("home");}} user={user} onLogout={function(){signOutUser();setIsGuest(false);saveLocal("is_guest",false);setScreen("home");}}/>}
          </div>

          {screen!=="practice"&&screen!=="admin"&&screen!=="chat"&&(
            <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:C.surface+"f0",backdropFilter:"blur(20px)",borderTop:"1px solid "+C.border,display:"flex",padding:"10px 0 20px",zIndex:20}}>
              {TABS.map(function(t){return(
                <button key={t.id} onClick={function(){
                  // 같은 탭 다시 누르면 맨 위로 스크롤
                  if(tab===t.id&&screen===t.id){
                    var scroller=document.querySelector('[data-scroller]');
                    if(scroller)scroller.scrollTo({top:0,behavior:"smooth"});
                    else window.scrollTo({top:0,behavior:"smooth"});
                  }
                  setTab(t.id);setScreen(t.id);
                }} style={{flex:1,background:"none",border:"none",color:tab===t.id?C.accent:C.muted,cursor:"pointer",padding:"6px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <TabIcon type={t.type} color={tab===t.id?C.accent:C.muted}/>
                  <div style={{fontSize:10,fontWeight:tab===t.id?700:400}}>{t.label}</div>
                  {!t.action&&tab===t.id&&<div style={{width:4,height:4,borderRadius:"50%",background:C.accent}}/>}
                </button>
              );})}
            </div>
          )}
          <PraiseModal data={praiseData} onClose={closePraise}/>
          {levelUpData&&(
            <div onClick={function(){setLevelUpData(null);}} style={{position:"fixed",inset:0,background:"#000d",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",animation:"splashFade 0.3s",cursor:"pointer"}}>
              <div style={{background:"linear-gradient(135deg,"+C.accent+"30,"+C.blue+"30)",border:"2px solid "+C.accent,borderRadius:24,padding:"40px 32px",textAlign:"center",maxWidth:340,animation:"levelUp 0.6s"}}>
                <div style={{fontSize:60,marginBottom:12}}>{"🎉"}</div>
                <div style={{fontSize:14,color:C.accent,letterSpacing:3,marginBottom:8,fontWeight:700}}>{"LEVEL UP!"}</div>
                <div style={{fontSize:36,fontWeight:900,color:C.accent,marginBottom:6}}>{"Lv."+levelUpData.level}</div>
                <div style={{fontSize:18,color:C.text,fontWeight:700,marginBottom:20}}>{levelUpData.name}</div>
                <div style={{fontSize:13,color:C.muted,marginBottom:8}}>{"축하합니다! 🎉"}</div>
                <div style={{fontSize:11,color:C.muted}}>탭하면 닫혀요</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
