    const { useState, useEffect, useRef, Fragment } = React;

    // ── FIREBASE INIT ───────────────────────────────────────────────
    var firebaseConfig = {

    function signInWithGoogle() {

    const ADMIN_KEY = "tf$9xQ2m7kW";
    const CREATOR_NAME = "by TalkFit";

    // ── STORAGE ─────────────────────────────────────────────────────
    function loadLocal(key) {
      try { var v = localStorage.getItem("tf_"+key); return v ? JSON.parse(v) : null; } catch { return null; }
    }
    function saveLocal(key, val) {
      try { localStorage.setItem("tf_"+key, JSON.stringify(val)); } catch {}
    }
    function load(key) { return loadLocal(key); }
    function save(key, val) { saveLocal(key, val); }

    async function loadCloud(userId, key) {
      try {
        var doc = await fbDb.collection("users").doc(userId).collection("data").doc(key).get();
        return doc.exists ? doc.data().value : null;
      } catch { return null; }
    }
    async function saveCloud(userId, key, val) {
      try {
        await fbDb.collection("users").doc(userId).collection("data").doc(key).set({ value: val, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      } catch {}
    }

    // ── XP + LEVEL SYSTEM ──────────────────────────────────────────
    var LEVELS = [
      {level:1,name:"Beginner",min:0,max:100},
      {level:2,name:"Starter",min:100,max:300},
      {level:3,name:"Learner",min:300,max:600},
      {level:4,name:"Speaker",min:600,max:1000},
      {level:5,name:"Talker",min:1000,max:1500},
      {level:6,name:"Fluent",min:1500,max:2200},
      {level:7,name:"Native-like",min:2200,max:3000},
      {level:8,name:"Master",min:3000,max:999999},
    ];
    function getLevel(xp) {
      for (var i=LEVELS.length-1;i>=0;i--) { if (xp>=LEVELS[i].min) return LEVELS[i]; }
      return LEVELS[0];
    }
    function addXP(amount) {
      var state = load("xp_state") || {xp:0};
      var oldLevel = getLevel(state.xp);
      state.xp += amount;
      var newLevel = getLevel(state.xp);
      save("xp_state", state);
      return {xp:state.xp, leveledUp:newLevel.level>oldLevel.level, level:newLevel};
    }
    function getXP() { return (load("xp_state")||{xp:0}).xp; }

    // ── STREAK BONUS (AI 횟수) ──────────────────────────────────────
    function getDailyLimit(streak) {
      if (streak>=30) return 10;
      if (streak>=7) return 5;
      return 3;
    }

    // ── CONFETTI ────────────────────────────────────────────────────
    function showConfetti() {
      var container = document.createElement('div');
      container.style.cssText='position:fixed;inset:0;z-index:9999;pointer-events:none;overflow:hidden';
      document.body.appendChild(container);
      var colors=['#7ee8a2','#fbbf24','#60a5fa','#fb923c','#f87171'];
      for(var i=0;i<60;i++){
        var p=document.createElement('div');
        var c=colors[Math.floor(Math.random()*colors.length)];
        var x=Math.random()*100;var d=Math.random()*3+2;var r=Math.random()*360;
        p.style.cssText='position:absolute;left:'+x+'%;top:-20px;width:'+d*3+'px;height:'+d*3+'px;background:'+c+';border-radius:'+(Math.random()>0.5?'50%':'2px')+';opacity:0.9;animation:confettiFall '+(Math.random()*2+1.5)+'s ease-out forwards;animation-delay:'+Math.random()*0.5+'s;transform:rotate('+r+'deg)';
        container.appendChild(p);
      }
      setTimeout(function(){container.remove();},4000);
    }

    // ── TTS HELPER ─────────────────────────────────────────────────
    // **verb** 마크다운을 하이라이트로 변환하는 공용 함수
    function renderHighlight(text, verbsUsed) {
      if (!text) return text;
      // ** 없으면 그대로
      if (text.indexOf("**") === -1) return text;
      // verbs_used에서 type 정보 가져오기
      var phrasalList = (verbsUsed||[]).filter(function(v){return v.type==="phrasal"||v.verb.indexOf(" ")!==-1;}).map(function(v){return v.verb.toLowerCase();});
      return text.split(/(\*\*[^*]+\*\*)/).map(function(part, i) {
        if (part.startsWith("**") && part.endsWith("**")) {
          var word = part.slice(2, -2);
          // 구동사 판별: type=phrasal이거나, 공백 포함이거나, phrasalList에 포함
          var isPhrasal = word.indexOf(" ") !== -1 || phrasalList.some(function(p){return p.indexOf(word.toLowerCase())!==-1 || word.toLowerCase().indexOf(p)!==-1;});
          var vc = isPhrasal ? C.accent : C.yellow;
          return React.createElement("span", {key: i, style: {color: vc, fontWeight: 800}}, word);
        }
        return part;
      });
    }

    function speakEnglish(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      u.rate = 0.9;
      window.speechSynthesis.speak(u);
    }

    // ── WEAK VERBS ─────────────────────────────────────────────────
    function getWeakVerbs() {
      return load("weak_verbs") || [];
    }
    function addWeakVerb(verb) {
      var list = getWeakVerbs();
      if (list.indexOf(verb) === -1) {
        list.push(verb);
        save("weak_verbs", list);
      }
    }
    function removeWeakVerb(verb) {
      var list = getWeakVerbs();
      var idx = list.indexOf(verb);
      if (idx !== -1) {
        list.splice(idx, 1);
        save("weak_verbs", list);
      }
    }

    // ── QUIZ GENERATOR (expanded: 6-8 questions, multiple types) ──
    function generateQuiz(lessons) {
      // lessons is an array of 2 lesson sets
      var quizzes = [];
      var allVerbs = [];
      var allExamples = [];

      for (var li = 0; li < lessons.length; li++) {
        var lesson = lessons[li];
        allVerbs.push({verb: lesson.basic.verb, meaning: lesson.basic.meaning_ko, type: "basic", lessonIdx: li});
        allVerbs.push({verb: lesson.phrasal.verb, meaning: lesson.phrasal.meaning_ko, type: "phrasal", lessonIdx: li});
        for (var ei = 0; ei < lesson.basic.examples.length; ei++) {
          allExamples.push({ex: lesson.basic.examples[ei], verb: lesson.basic.verb, meaning: lesson.basic.meaning_ko});
        }
        for (var pi = 0; pi < lesson.phrasal.examples.length; pi++) {
          allExamples.push({ex: lesson.phrasal.examples[pi], verb: lesson.phrasal.verb, meaning: lesson.phrasal.meaning_ko});
        }
      }

      var wrongMeanings = ["참다","던지다","끌다","닫다","열다","세다","울다","웃다","쉬다","놀다","밀다","빌리다"];
      var wrongVerbs = ["give up","break down","show off","bring up","take over","call off","hang out","figure out","end up","carry on"];
      var wrongSentences = ["I have to go now.","She made a big mistake.","Can you take this?","Let me think about it.","He ran into some trouble.","We should call it a day."];

      // Q1: meaning quiz for lesson1 basic
      var b1 = lessons[0].basic;
      var correctM1 = b1.meaning_ko.split(",")[0].trim();
      var opts1 = [correctM1].concat(wrongMeanings.filter(function(w){return w!==correctM1;}).sort(function(){return Math.random()-0.5;}).slice(0,3)).sort(function(){return Math.random()-0.5;});
      quizzes.push({type:"meaning", question:'"'+b1.verb+'" 의 뜻은?', options:opts1, answer:correctM1, verb:b1.verb});

      // Q2: fill-blank for lesson1 phrasal
      var p1 = lessons[0].phrasal;
      var ex1 = p1.examples[0];
      var blank1 = ex1.english.replace(new RegExp(p1.verb.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"i"),"______");
      var wrongV1 = wrongVerbs.filter(function(v){return v!==p1.verb;}).sort(function(){return Math.random()-0.5;}).slice(0,3);
      var opts2 = [p1.verb].concat(wrongV1).sort(function(){return Math.random()-0.5;});
      quizzes.push({type:"fillblank", question:blank1, hint:ex1.korean, options:opts2, answer:p1.verb, verb:p1.verb});

      // Q3: listening quiz - TTS plays English, pick Korean meaning
      var listenEx = allExamples[Math.floor(Math.random() * allExamples.length)];
      var wrongKorean = allExamples.filter(function(e){return e.ex.korean !== listenEx.ex.korean;}).map(function(e){return e.ex.korean;});
      // Add some generic wrong Korean options
      var extraWrong = ["오늘 일찍 퇴근해야 해","그건 좀 어려울 것 같아","나 어제 많이 먹었어"];
      wrongKorean = wrongKorean.concat(extraWrong);
      var uniqueWrong = [];
      for (var wi = 0; wi < wrongKorean.length; wi++) {
        if (uniqueWrong.indexOf(wrongKorean[wi]) === -1 && wrongKorean[wi] !== listenEx.ex.korean) {
          uniqueWrong.push(wrongKorean[wi]);
        }
      }
      var listenOpts = [listenEx.ex.korean].concat(uniqueWrong.sort(function(){return Math.random()-0.5;}).slice(0,3)).sort(function(){return Math.random()-0.5;});
      quizzes.push({type:"listening", audio_text:listenEx.ex.english, options:listenOpts, answer:listenEx.ex.korean, verb:listenEx.verb});

      // Q4: meaning quiz for lesson2 phrasal
      var p2 = lessons[1].phrasal;
      var correctM2 = p2.meaning_ko.split(",")[0].trim();
      var opts4 = [correctM2].concat(wrongMeanings.filter(function(w){return w!==correctM2;}).sort(function(){return Math.random()-0.5;}).slice(0,3)).sort(function(){return Math.random()-0.5;});
      quizzes.push({type:"meaning", question:'"'+p2.verb+'" 의 뜻은?', options:opts4, answer:correctM2, verb:p2.verb});

      // Q5: arrange - sentence ordering
      var arrangeEx = allExamples[Math.floor(Math.random() * allExamples.length)];
      var arrangeWords = arrangeEx.ex.english.replace(/[.,!?]/g,"").split(" ");
      var shuffledWords = [].concat(arrangeWords).sort(function(){return Math.random()-0.5;});
      // Make sure shuffled is different from original
      var attempts = 0;
      while (shuffledWords.join(" ") === arrangeWords.join(" ") && attempts < 10) {
        shuffledWords = [].concat(arrangeWords).sort(function(){return Math.random()-0.5;});
        attempts++;
      }
      quizzes.push({type:"arrange", words:shuffledWords, answer:arrangeWords.join(" "), hint:arrangeEx.ex.korean, verb:arrangeEx.verb});

      // Q6: fill-blank for lesson2 basic
      var b2 = lessons[1].basic;
      var ex6 = b2.examples[0];
      var blank6 = ex6.english.replace(new RegExp(b2.verb.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"i"),"______");
      var wrongV6 = ["get","make","take","put","go","come","keep","look","work","run","call","find"].filter(function(v){return v!==b2.verb;}).sort(function(){return Math.random()-0.5;}).slice(0,3);
      var opts6 = [b2.verb].concat(wrongV6).sort(function(){return Math.random()-0.5;});
      quizzes.push({type:"fillblank", question:blank6, hint:ex6.korean, options:opts6, answer:b2.verb, verb:b2.verb});

      // Q7: situation quiz
      var sitEx = allExamples[Math.floor(Math.random() * allExamples.length)];
      var wrongEng = allExamples.filter(function(e){return e.ex.english !== sitEx.ex.english;}).map(function(e){return e.ex.english;});
      wrongEng = wrongEng.concat(wrongSentences);
      var uniqueWrongEng = [];
      for (var we = 0; we < wrongEng.length; we++) {
        if (uniqueWrongEng.indexOf(wrongEng[we]) === -1 && wrongEng[we] !== sitEx.ex.english) {
          uniqueWrongEng.push(wrongEng[we]);
        }
      }
      var sitOpts = [sitEx.ex.english].concat(uniqueWrongEng.sort(function(){return Math.random()-0.5;}).slice(0,3)).sort(function(){return Math.random()-0.5;});
      quizzes.push({type:"situation", question:'상황: "'+sitEx.ex.korean+'"\n"'+sitEx.verb+'" 을(를) 사용한 올바른 문장은?', options:sitOpts, answer:sitEx.ex.english, verb:sitEx.verb});

      // Add 1 weak verb review question if available
      var weakVerbs = getWeakVerbs();
      if (weakVerbs.length > 0) {
        var weakVerb = weakVerbs[Math.floor(Math.random() * weakVerbs.length)];
        // Find the verb in LESSON_POOL
        for (var lpi = 0; lpi < LESSON_POOL.length; lpi++) {
          var lp = LESSON_POOL[lpi];
          if (lp.basic.verb === weakVerb || lp.phrasal.verb === weakVerb) {
            var weakItem = lp.basic.verb === weakVerb ? lp.basic : lp.phrasal;
            var weakCorrect = weakItem.meaning_ko.split(",")[0].trim();
            var weakOpts = [weakCorrect].concat(wrongMeanings.filter(function(w){return w!==weakCorrect;}).sort(function(){return Math.random()-0.5;}).slice(0,3)).sort(function(){return Math.random()-0.5;});
            quizzes.push({type:"meaning", question:'[복습] "'+weakItem.verb+'" 의 뜻은?', options:weakOpts, answer:weakCorrect, verb:weakItem.verb, isReview:true});
            break;
          }
        }
      }

      return quizzes;
    }

    // ── CLAUDE API (via server proxy) ──────────────────────────────
    var aiRemaining = 100;
    var aiRemainingListeners = [];
    function onAiRemainingChange(fn) { aiRemainingListeners.push(fn); }
    function setAiRemaining(v) { aiRemaining = v; aiRemainingListeners.forEach(function(fn){fn(v);}); }

    async function callClaude(system, user) {
      var res = await fetch("/api/claude", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ system: system, user: user }),
      });
      var data = await res.json();
      if (!res.ok) {
        if (data.remaining !== undefined) setAiRemaining(data.remaining);
        throw new Error(data.error || "AI 오류");
      }
      if (data.remaining !== undefined) setAiRemaining(data.remaining);
      return data.text || "";
    }

    // ── ANALYTICS ───────────────────────────────────────────────────
    function track(event) {
      var today = new Date().toISOString().slice(0, 10);
      var key = "stat:" + today + ":" + event;
      var count = (load(key) || 0) + 1;
      save(key, count);
    }

    function fetchStats() {
      var days = [];
      for (var i = 0; i < 14; i++) {
        var d = new Date(); d.setDate(d.getDate() - i);
        days.push(d.toISOString().slice(0, 10));
      }
      var events = ["visit","lesson_start","lesson_done","reaction_good","reaction_mid","reaction_bad","feedback_click","login_attempt"];
      var result = {};
      for (var di = 0; di < days.length; di++) {
        var day = days[di];
        result[day] = {};
        for (var ei = 0; ei < events.length; ei++) {
          result[day][events[ei]] = load("stat:" + day + ":" + events[ei]) || 0;
        }
      }
      return result;
    }

    // ── LESSON POOL ─────────────────────────────────────────────────
    var LESSON_POOL = [
      {
        basic:{verb:"get",meaning_ko:"얻다, 되다, 이해하다",meaning_en:"one of the most versatile verbs",
          meanings:[{meaning:"얻다/받다",example:"I got your message."},{meaning:"되다",example:"It's getting cold."},{meaning:"이해하다",example:"I don't get it."}],
          examples:[{situation:"일상",english:"Did you get my text?",korean:"내 문자 받았어?"},{situation:"이해",english:"I totally get how you feel.",korean:"네 기분 완전 이해해."},{situation:"변화",english:"It's getting harder to focus.",korean:"집중하기 점점 힘드네."}],

    // ── getTodayLesson: returns array of 2 lesson sets ─────────────
    function getTodayLesson() {
      var dayIndex = Math.floor(Date.now() / 86400000);
      var idx1 = (dayIndex * 2) % LESSON_POOL.length;
      var idx2 = (dayIndex * 2 + 1) % LESSON_POOL.length;
      return [LESSON_POOL[idx1], LESSON_POOL[idx2]];
    }

    async function generateNewLesson(completedVerbs) {
      var system = 'You help Korean students learn American English. Generate a lesson with a basic verb AND a phrasal verb that shares the same root (e.g., get -> get over). NEVER use these already-learned verbs: ' + completedVerbs.join(", ") + '. Return ONLY valid JSON: {"basic":{"verb":"...","meaning_ko":"...","meaning_en":"...","meanings":[{"meaning":"","example":""}],"examples":[{"situation":"","english":"","korean":""}],"bad_example":"","good_example":"","practice_hint":""},"phrasal":{"verb":"... (must share same root as basic verb)","meaning_ko":"...","meaning_en":"...","meanings":[],"examples":[{"situation":"","english":"","korean":""}],"bad_example":"","good_example":"","practice_hint":""}}';
      var raw = await callClaude(system, "Generate today's lesson. Pick a common English verb not yet learned. The phrasal verb MUST share the same root verb. Focus on daily American English usage.");
      return JSON.parse(raw.replace(/```json|```/g,"").trim());
    }

      yellow:"#fbbf24",yellowDim:"#fbbf2415",

          )}

          <div style={{display:"flex",gap:10,marginTop:4}}>
            {[{label:"학습한 날",value:streak+"일"},{label:"AI 남은 횟수",value:aiRemaining+"회"}].map(function(s,i){return(
              <div key={i} style={{flex:1,background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"12px 14px"}}>
                <div style={{fontSize:18,fontWeight:800}}>{s.value}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>{s.label}</div>
              </div>
            );})}
          </div>

          <div style={{marginTop:28,paddingTop:20,borderTop:"1px solid "+C.border,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:900,color:C.accent,letterSpacing:2,marginBottom:4}}>{"TALKFIT"}</div>
            <div style={{fontSize:10,color:C.muted,opacity:0.6}}>{"© 2026 TalkFit. All rights reserved."}</div>
            <div style={{fontSize:10,color:C.muted,opacity:0.4,marginTop:2}}>{"Master English with your own words."}</div>
          </div>
        </div>
      );
    }

    // ── LEARN ───────────────────────────────────────────────────────
    function LearnScreen(props) {
      var lessons=props.lessons, loading=props.loading, onNext=props.onNext, aiAvailable=props.aiAvailable, onXP=props.onXP;
      // lessonSetIdx: 0 or 1 (which of the 2 sets)
      // phase: "basic" or "phrasal"
      var _s1=useState(0); var lessonSetIdx=_s1[0]; var setLessonSetIdx=_s1[1];
      var _s1b=useState("basic"); var phase=_s1b[0]; var setPhase=_s1b[1];
      var _s2=useState(0); var step=_s2[0]; var setStep=_s2[1];
      var _s3=useState(null); var quizzes=_s3[0]; var setQuizzes=_s3[1];
      var _s4=useState(0); var quizIdx=_s4[0]; var setQuizIdx=_s4[1];
      var _s5=useState(null); var selected=_s5[0]; var setSelected=_s5[1];
      var _s6=useState(false); var answered=_s6[0]; var setAnswered=_s6[1];
      var _s7=useState(0); var correctCount=_s7[0]; var setCorrectCount=_s7[1];
      var _s8=useState(false); var quizDone=_s8[0]; var setQuizDone=_s8[1];
      var _s9=useState(null); var xpPopup=_s9[0]; var setXpPopup=_s9[1];
      // For arrange quiz type
      var _sa=useState([]); var arrangeSelected=_sa[0]; var setArrangeSelected=_sa[1];
      var _sb=useState(false); var arrangeChecked=_sb[0]; var setArrangeChecked=_sb[1];

      if (loading) return (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",gap:16}}>
          <div style={{fontSize:36}}>{"✨"}</div>
          <div style={{color:C.muted,fontSize:14}}>오늘의 레슨 준비 중...</div>
        </div>
      );
      if (!lessons || !lessons.length) return null;

      var lesson = lessons[lessonSetIdx];
      if (!lesson) return null;
      var current = phase==="basic" ? lesson.basic : lesson.phrasal;
      var color = phase==="basic" ? C.yellow : C.accent;

      // Progress label: set1 basic, set1 phrasal, set2 basic, set2 phrasal
      var totalPhases = lessons.length * 2; // 4 phases
      var currentPhaseNum = lessonSetIdx * 2 + (phase==="basic"?0:1);

      var showXpGain = function(amount) {
        setXpPopup("+"+amount+" XP");
        setTimeout(function(){setXpPopup(null);},1200);
      };

      var goNext = function() {
        if (step<2) {
          setStep(function(s){return s+1;});
          var r=addXP(5); showXpGain(5); if(onXP)onXP(r);
          return;
        }
        if (phase==="basic") {
          setPhase("phrasal"); setStep(0);
          var r2=addXP(10); showXpGain(10); if(onXP)onXP(r2);
          return;
        }
        // After phrasal done for current set
        if (lessonSetIdx < lessons.length - 1) {
          // Move to next lesson set
          setLessonSetIdx(function(i){return i+1;});
          setPhase("basic"); setStep(0);
          var r3=addXP(10); showXpGain(10); if(onXP)onXP(r3);
          return;
        }
        // All 4 verbs done, start quiz
        setQuizzes(generateQuiz(lessons));
        setQuizIdx(0); setSelected(null); setAnswered(false); setCorrectCount(0); setQuizDone(false);
        setArrangeSelected([]); setArrangeChecked(false);
        setStep(3);
        var r4=addXP(10); showXpGain(10); if(onXP)onXP(r4);
      };

      var handleQuizAnswer = function(opt) {
        if (answered) return;
        setSelected(opt); setAnswered(true);
        var isCorrect = opt === quizzes[quizIdx].answer;
        if (isCorrect) {
          setCorrectCount(function(c){return c+1;});
          var r=addXP(15); showXpGain(15); if(onXP)onXP(r);
          // If it was a review question and correct, remove from weak verbs
          if (quizzes[quizIdx].isReview) {
            removeWeakVerb(quizzes[quizIdx].verb);
          }
        } else {
          // Wrong answer: add to weak verbs
          addWeakVerb(quizzes[quizIdx].verb);
        }
      };

      var handleArrangeCheck = function() {
        setArrangeChecked(true);
        var builtSentence = arrangeSelected.join(" ");
        var isCorrect = builtSentence.toLowerCase() === quizzes[quizIdx].answer.toLowerCase();
        setAnswered(true);
        if (isCorrect) {
          setCorrectCount(function(c){return c+1;});
          var r=addXP(15); showXpGain(15); if(onXP)onXP(r);
          if (quizzes[quizIdx].isReview) removeWeakVerb(quizzes[quizIdx].verb);
        } else {
          addWeakVerb(quizzes[quizIdx].verb);
        }
      };

      var handleListeningPlay = function() {
        if (quizzes && quizzes[quizIdx] && quizzes[quizIdx].audio_text) {
          speakEnglish(quizzes[quizIdx].audio_text);
        }
      };

      var nextQuiz = function() {
        if (quizIdx < quizzes.length - 1) {
          setQuizIdx(function(i){return i+1;}); setSelected(null); setAnswered(false);
          setArrangeSelected([]); setArrangeChecked(false);
        } else {
          setQuizDone(true);
          var bonus = correctCount === quizzes.length ? 30 : 0;
          if (bonus) { var r=addXP(bonus); showXpGain(bonus); if(onXP)onXP(r); showConfetti(); }
          else { showConfetti(); }
        }
      };

      var phaseLabels = [];
      for (var pli = 0; pli < lessons.length; pli++) {
        phaseLabels.push({id:"set"+pli+"basic",label:lessons[pli].basic.verb,color:C.yellow,setIdx:pli,phase:"basic"});
        phaseLabels.push({id:"set"+pli+"phrasal",label:lessons[pli].phrasal.verb,color:C.accent,setIdx:pli,phase:"phrasal"});
      }

      var btnLabel = step<2 ? "다음 →" : phase==="basic" ? "구동사 학습하기 →" : (lessonSetIdx < lessons.length - 1 ? "다음 동사 세트 →" : "퀴즈 풀기 →");

      return (
        <div style={{padding:"24px 20px"}}>
          {step<3&&(
            <div>
              <div style={{display:"flex",gap:4,marginBottom:20,flexWrap:"wrap"}}>
                {phaseLabels.map(function(t,ti){
                  var isCurrent = t.setIdx===lessonSetIdx && t.phase===phase;
                  var isDone = t.setIdx<lessonSetIdx || (t.setIdx===lessonSetIdx && t.phase==="basic" && phase==="phrasal");
                  return(
                    <div key={t.id} style={{flex:1,minWidth:60,padding:"7px 4px",borderRadius:8,textAlign:"center",background:isCurrent?t.color+"20":C.surface,border:"1px solid "+(isCurrent?t.color+"60":C.border),fontSize:11,fontWeight:700,color:isCurrent?t.color:C.muted}}>
                      {isDone?"✓ ":""}{t.label}
                    </div>
                  );
                })}
              </div>

              <div style={{display:"flex",gap:5,marginBottom:24}}>
                {["뜻","예문","패턴","퀴즈"].map(function(s,i){return(
                  <div key={i} style={{flex:1,height:3,borderRadius:99,background:i<=step?color:C.border,transition:"background 0.3s"}}/>
                );})}
              </div>
            </div>
          )}

          {step===0&&(
            <div>
              <div style={{display:"inline-block",padding:"3px 12px",borderRadius:99,background:color+"20",color:color,fontSize:11,fontWeight:700,letterSpacing:2,border:"1px solid "+color+"40",marginBottom:16}}>
                {phase==="basic"?"기본동사":"구동사"}
              </div>
              <div style={{fontSize:44,fontWeight:900,color:color,marginBottom:8,letterSpacing:-1}}>{current.verb}</div>
              <div style={{fontSize:18,color:C.text,marginBottom:6,fontWeight:600}}>{current.meaning_ko}</div>
              <div style={{fontSize:14,color:C.muted,marginBottom:24,lineHeight:1.6}}>{current.meaning_en}</div>
              {current.meanings?.length>0&&(
                <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16,marginBottom:20}}>
                  <div style={{fontSize:11,color:C.muted,letterSpacing:2,marginBottom:12}}>주요 의미 {current.meanings.length}가지</div>
                  {current.meanings.map(function(m,i){return(
                    <div key={i} style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}>
                      <span style={{background:color+"20",color:color,borderRadius:6,padding:"2px 8px",fontSize:12,fontWeight:700,flexShrink:0,marginTop:2}}>{i+1}</span>
                      <div>
                        <div style={{fontSize:13,color:C.text,fontWeight:600}}>{m.meaning}</div>
                        <div style={{fontSize:12,color:C.muted,marginTop:2,fontStyle:"italic"}}>"{m.example}"</div>
                      </div>
                    </div>
                  );})}
                </div>
              )}
            </div>
          )}

          {step===1&&(
            <div>
              <div style={{fontSize:11,color:C.muted,letterSpacing:3,marginBottom:12}}>REAL EXAMPLES</div>
              <div style={{fontSize:20,fontWeight:800,marginBottom:16}}>미국인이 실제로 쓰는 문장</div>
              {current.examples?.map(function(ex,i){return(
                <div key={i} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16,marginBottom:12}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:8}}>상황 {i+1}: {ex.situation}</div>
                  <div style={{fontSize:15,color:C.text,fontWeight:600,marginBottom:6,lineHeight:1.5}}>{ex.english}</div>
                  <div style={{fontSize:13,color:C.muted}}>{ex.korean}</div>
                </div>
              );})}
            </div>
          )}

          {step===2&&(
            <div>
              <div style={{fontSize:11,color:C.muted,letterSpacing:3,marginBottom:12}}>SENTENCE PATTERN</div>
              <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16,marginBottom:12}}>
                <div style={{fontSize:12,color:C.red,marginBottom:8}}>{"❌ 어색해요"}</div>
                <div style={{fontSize:14,color:C.red,padding:"10px 12px",background:C.red+"10",borderRadius:8,fontStyle:"italic"}}>"{current.bad_example}"</div>
              </div>
              <div style={{background:C.surface,border:"1px solid "+color+"40",borderRadius:12,padding:16,marginBottom:16}}>
                <div style={{fontSize:12,color:color,marginBottom:8}}>{"✅ 자연스러워요"}</div>
                <div style={{fontSize:14,color:C.text,padding:"10px 12px",background:color+"10",borderRadius:8,lineHeight:1.6}}>"{current.good_example}"</div>
              </div>
              <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:14,marginBottom:16}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:6,letterSpacing:2}}>PRACTICE HINT</div>
                <div style={{fontSize:13,color:C.text,lineHeight:1.7}}>{current.practice_hint}</div>
              </div>

              {current.confuse_with&&(
                <div style={{background:C.orange+"10",border:"1px solid "+C.orange+"30",borderRadius:12,padding:14,marginBottom:20}}>
                  <div style={{fontSize:11,color:C.orange,letterSpacing:2,marginBottom:8}}>{"🔍 헷갈리는 동사 비교"}</div>
                  <div style={{display:"flex",gap:6,marginBottom:6}}>
                    <span style={{color:color,fontWeight:800,fontSize:15}}>{current.verb}</span>
                    <span style={{color:C.muted,fontSize:13}}>vs</span>
                    <span style={{color:C.orange,fontWeight:800,fontSize:15}}>{current.confuse_with.verb}</span>
                  </div>
                  <div style={{fontSize:13,color:C.text,lineHeight:1.6,marginBottom:8}}>{current.confuse_with.diff_ko}</div>
                  <div style={{display:"flex",gap:8,flexDirection:"column"}}>
                    <div onClick={function(){speakEnglish(current.confuse_with.example_this);}} style={{fontSize:12,color:color,cursor:"pointer",background:color+"10",borderRadius:8,padding:"8px 10px"}}>{"🔊 "}{current.verb}: "{current.confuse_with.example_this}"</div>
                    <div onClick={function(){speakEnglish(current.confuse_with.example_other);}} style={{fontSize:12,color:C.orange,cursor:"pointer",background:C.orange+"10",borderRadius:8,padding:"8px 10px"}}>{"🔊 "}{current.confuse_with.verb}: "{current.confuse_with.example_other}"</div>
                  </div>
                </div>
              )}
            </div>
          )}

          {step===3&&quizzes&&!quizDone&&(
            <div>
              <div style={{fontSize:11,color:C.accent,letterSpacing:3,marginBottom:6}}>QUIZ</div>
              <div style={{display:"flex",gap:5,marginBottom:16}}>
                {quizzes.map(function(_,i){return(
                  <div key={i} style={{flex:1,height:3,borderRadius:99,background:i<=quizIdx?C.accent:C.border,transition:"background 0.3s"}}/>
                );})}
              </div>

              {/* LISTENING type */}
              {quizzes[quizIdx].type==="listening"&&(
                <div>
                  <div style={{fontSize:14,color:C.muted,marginBottom:8}}>듣고 올바른 뜻을 고르세요</div>
                  <button onClick={handleListeningPlay} style={{background:C.blue+"20",border:"1px solid "+C.blue+"60",borderRadius:12,padding:"16px 24px",cursor:"pointer",marginBottom:16,display:"flex",alignItems:"center",gap:10,width:"100%",justifyContent:"center"}}>
                    <span style={{fontSize:24}}>{"🔊"}</span>
                    <span style={{fontSize:15,fontWeight:700,color:C.blue}}>들어보기</span>
                  </button>
                  {answered&&(
                    <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:12,marginBottom:12}}>
                      <div style={{fontSize:12,color:C.muted,marginBottom:4}}>원문:</div>
                      <div style={{fontSize:14,color:C.text,fontWeight:600}}>{quizzes[quizIdx].audio_text}</div>
                    </div>
                  )}
                  {quizzes[quizIdx].options.map(function(opt,i){
                    var isCorrect = opt===quizzes[quizIdx].answer;
                    var isSelected = opt===selected;
                    var bg = !answered?C.surface : isCorrect?C.accent+"20" : isSelected?C.red+"20":C.surface;
                    var border = !answered?C.border : isCorrect?C.accent+"60" : isSelected?C.red+"60":C.border;
                    var textColor = !answered?C.text : isCorrect?C.accent : isSelected?C.red:C.muted;
                    return (
                      <div key={i} onClick={function(){handleQuizAnswer(opt);}}
                        style={{background:bg,border:"1px solid "+border,borderRadius:12,padding:"14px 16px",marginBottom:8,cursor:answered?"default":"pointer",
                          animation:answered&&isSelected&&!isCorrect?"wrongShake 0.4s":"none"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div style={{fontSize:15,fontWeight:600,color:textColor}}>{opt}</div>
                          {answered&&isCorrect&&<span style={{color:C.accent,fontSize:16}}>{"✓"}</span>}
                          {answered&&isSelected&&!isCorrect&&<span style={{color:C.red,fontSize:16}}>{"✗"}</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* ARRANGE type */}
              {quizzes[quizIdx].type==="arrange"&&(
                <div>
                  <div style={{fontSize:14,color:C.muted,marginBottom:8}}>단어를 올바른 순서로 배열하세요</div>
                  {quizzes[quizIdx].hint&&<div style={{fontSize:13,color:C.muted,marginBottom:12}}>{quizzes[quizIdx].hint}</div>}

                  {/* Built sentence area */}
                  <div style={{background:C.surface,border:"1px solid "+(arrangeChecked?(arrangeSelected.join(" ").toLowerCase()===quizzes[quizIdx].answer.toLowerCase()?C.accent+"60":C.red+"60"):C.border),borderRadius:12,padding:16,marginBottom:16,minHeight:50}}>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",minHeight:32}}>
                      {arrangeSelected.length===0&&<span style={{color:C.muted,fontSize:13}}>여기에 단어가 표시됩니다</span>}
                      {arrangeSelected.map(function(w,i){return(
                        <button key={i} onClick={function(){if(arrangeChecked)return;setArrangeSelected(function(prev){var n=[].concat(prev);n.splice(i,1);return n;});}}
                          style={{background:C.accent+"20",border:"1px solid "+C.accent+"40",color:C.accent,borderRadius:8,padding:"6px 12px",fontSize:14,fontWeight:600,cursor:arrangeChecked?"default":"pointer"}}>
                          {w}
                        </button>
                      );})}
                    </div>
                  </div>

                  {/* Word chips */}
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
                    {quizzes[quizIdx].words.map(function(w,i){
                      var usedCount = 0;
                      for (var ui = 0; ui < arrangeSelected.length; ui++) {
                        if (arrangeSelected[ui] === w) usedCount++;
                      }
                      var availCount = 0;
                      for (var ai = 0; ai < quizzes[quizIdx].words.length; ai++) {
                        if (ai <= i && quizzes[quizIdx].words[ai] === w) availCount++;
                      }
                      // Check how many times this word appears at this index or before
                      var totalInWords = quizzes[quizIdx].words.filter(function(ww){return ww===w;}).length;
                      var usedTotal = arrangeSelected.filter(function(ww){return ww===w;}).length;
                      var isUsed = usedTotal >= totalInWords;
                      // Simpler: track by index
                      var usedIndices = [];
                      var tempSelected = [].concat(arrangeSelected);
                      for (var ti = 0; ti < quizzes[quizIdx].words.length; ti++) {
                        var idx = tempSelected.indexOf(quizzes[quizIdx].words[ti]);
                        if (idx !== -1) { usedIndices.push(ti); tempSelected.splice(idx, 1); }
                      }
                      var thisUsed = usedIndices.indexOf(i) !== -1;

                      return(
                        <button key={i} onClick={function(){if(arrangeChecked||thisUsed)return;setArrangeSelected(function(prev){return [].concat(prev,[w]);});}}
                          style={{background:thisUsed?C.border:C.surface,border:"1px solid "+C.border,color:thisUsed?C.muted:C.text,borderRadius:8,padding:"8px 14px",fontSize:14,fontWeight:600,cursor:arrangeChecked||thisUsed?"default":"pointer",opacity:thisUsed?0.4:1}}>
                          {w}
                        </button>
                      );
                    })}
                  </div>

                  {!arrangeChecked&&(
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={function(){setArrangeSelected([]);}} style={{flex:1,background:C.surface,border:"1px solid "+C.border,color:C.muted,borderRadius:12,padding:14,fontSize:14,fontWeight:600,cursor:"pointer"}}>초기화</button>
                      <button onClick={handleArrangeCheck} disabled={arrangeSelected.length===0} style={{flex:2,background:arrangeSelected.length>0?C.accent:C.border,color:arrangeSelected.length>0?"#08090d":C.muted,border:"none",borderRadius:12,padding:14,fontSize:14,fontWeight:800,cursor:"pointer"}}>확인</button>
                    </div>
                  )}
                  {arrangeChecked&&(
                    <div>
                      <div style={{fontSize:14,fontWeight:700,color:arrangeSelected.join(" ").toLowerCase()===quizzes[quizIdx].answer.toLowerCase()?C.accent:C.red,marginBottom:8}}>
                        {arrangeSelected.join(" ").toLowerCase()===quizzes[quizIdx].answer.toLowerCase()?"정답!":"오답!"}
                      </div>
                      {arrangeSelected.join(" ").toLowerCase()!==quizzes[quizIdx].answer.toLowerCase()&&(
                        <div style={{fontSize:13,color:C.muted,marginBottom:8}}>정답: {quizzes[quizIdx].answer}</div>
                      )}
                    </div>
                  )}
                </div>
              )}

              {/* STANDARD types: meaning, fillblank, translate, situation */}
              {quizzes[quizIdx].type!=="listening"&&quizzes[quizIdx].type!=="arrange"&&(
                <div>
                  <div style={{fontSize:18,fontWeight:800,marginBottom:6,lineHeight:1.4,whiteSpace:"pre-line"}}>{quizzes[quizIdx].question}</div>
                  {quizzes[quizIdx].hint&&<div style={{fontSize:13,color:C.muted,marginBottom:16}}>{quizzes[quizIdx].hint}</div>}
                  {quizzes[quizIdx].options.map(function(opt,i){
                    var isCorrect = opt===quizzes[quizIdx].answer;
                    var isSelected = opt===selected;
                    var bg = !answered?C.surface : isCorrect?C.accent+"20" : isSelected?C.red+"20":C.surface;
                    var border = !answered?C.border : isCorrect?C.accent+"60" : isSelected?C.red+"60":C.border;
                    var textColor = !answered?C.text : isCorrect?C.accent : isSelected?C.red:C.muted;
                    return (
                      <div key={i} onClick={function(){handleQuizAnswer(opt);}}
                        style={{background:bg,border:"1px solid "+border,borderRadius:12,padding:"14px 16px",marginBottom:8,cursor:answered?"default":"pointer",
                          animation:answered&&isSelected&&!isCorrect?"wrongShake 0.4s":"none"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div style={{fontSize:15,fontWeight:600,color:textColor}}>{opt}</div>
                          {answered&&isCorrect&&<span style={{color:C.accent,fontSize:16}}>{"✓"}</span>}
                          {answered&&isSelected&&!isCorrect&&<span style={{color:C.red,fontSize:16}}>{"✗"}</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {(answered||arrangeChecked)&&(
                <button onClick={nextQuiz} style={{width:"100%",background:C.accent,color:"#08090d",border:"none",borderRadius:14,padding:16,fontSize:15,fontWeight:800,cursor:"pointer",marginTop:8}}>
                  {quizIdx<quizzes.length-1?"다음 문제 →":"결과 보기 →"}
                </button>
              )}
            </div>
          )}

          {step===3&&quizDone&&(
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:64,marginBottom:12}}>{correctCount===quizzes.length?"🎉":"👏"}</div>
              <div style={{fontSize:24,fontWeight:900,marginBottom:8}}>{correctCount}/{quizzes.length} 정답!</div>
              <div style={{fontSize:14,color:C.muted,marginBottom:8}}>
                {correctCount===quizzes.length?"퍼펙트! 보너스 +30 XP":"잘했어요! 다음엔 더 잘할 수 있어요"}

    // ── CHAT SCREEN ─────────────────────────────────────────────────
    function ChatScreen(props) {
      var onHome = props.onHome;
      var _s1=useState([]); var messages=_s1[0]; var setMessages=_s1[1];
      var _s2=useState(""); var input=_s2[0]; var setInput=_s2[1];
      var _s3=useState(false); var isLoading=_s3[0]; var setIsLoading=_s3[1];
      var chatEndRef = useRef(null);

      useEffect(function(){
        // AI greeting
        setMessages([{role:"ai",text:"Hey! How's it going? What's on your mind today?",correction:""}]);
      },[]);

      useEffect(function(){
        if(chatEndRef.current) chatEndRef.current.scrollIntoView({behavior:"smooth"});
      },[messages]);

      var sendMessage = function() {
        var text = input.trim();
        if (!text || isLoading) return;
        var newMessages = [].concat(messages, [{role:"user",text:text,correction:""}]);
        setMessages(newMessages);
        setInput("");
        setIsLoading(true);

        var conversationHistory = newMessages.map(function(m){return (m.role==="ai"?"AI: ":"Student: ")+m.text;}).join("\n");
        var system = 'You are a friendly American English conversation partner. Rules:\n- Keep responses SHORT (1-2 sentences)\n- Use natural American English\n- If the student makes mistakes, add [교정: correction in Korean]\n- Ask follow-up questions to continue\nReturn ONLY valid JSON:\n{"response":"English reply","correction":"교정 (or empty string)"}';
        callClaude(system, 'Conversation so far:\n'+conversationHistory+'\n\nRespond to the student\'s last message naturally.')
        .then(function(raw){

                  // 빈칸 채우기
                  if(t.verbs_used&&t.verbs_used.length>0){
                    var verb = t.verbs_used[0];
                    var blank = eng.replace(new RegExp("\\b"+verb.verb.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i"),"_____");
                    if(blank!==eng) allQuestions.push({type:"fill",korean:kor,sentence:blank,answer:verb.verb,english:eng});
                  }
                  // 순서 맞추기 (8단어 이하만)
                  if(eng.split(" ").length<=8){
                    var words = eng.split(" ");
                    var shuffled = [].concat(words);
                    for(var si=shuffled.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var tmp=shuffled[si];shuffled[si]=shuffled[sj];shuffled[sj]=tmp;}
                    allQuestions.push({type:"order",korean:kor,words:shuffled,answer:eng});
                  }
                });
                // 빈칸 2개 + 순서 2개, 최소 4문제 보장
                var fills = allQuestions.filter(function(q){return q.type==="fill";});
                var orders = allQuestions.filter(function(q){return q.type==="order";}).sort(function(a,b){return a.words.length-b.words.length;});
                var picked = [];
                // 빈칸 최대 2개
                for(var fi=0;fi<Math.min(2,fills.length);fi++) picked.push(fills[fi]);
                // 순서 최대 2개
                for(var oi=0;oi<Math.min(2,orders.length);oi++) picked.push(orders[oi]);
                // 4문제 미달이면 남은 것에서 채움
                var remaining = fills.slice(2).concat(orders.slice(2));
                while(picked.length<4&&remaining.length>0) picked.push(remaining.shift());
                allQuestions = picked;
                if(allQuestions.length===0) return null;
                var q = allQuestions[practiceIdx%allQuestions.length];

                      var selected = (practiceAnswer||"").split(" ").filter(function(s){return s;});
                      var usedCount = selected.filter(function(s){return s===w;}).length;
                      var totalCount = q.words.slice(0,wi+1).filter(function(ww){return ww===w;}).length;
                      var isUsed = usedCount>=totalCount;
                      return <button key={wi} disabled={isUsed||!!practiceCheck} onClick={function(){setPracticeAnswer(function(a){return a?a+" "+w:w;});}} style={{background:isUsed?C.border:C.orange+"20",color:isUsed?C.muted:C.orange,border:"1px solid "+(isUsed?C.border:C.orange+"40"),borderRadius:8,padding:"8px 14px",fontSize:14,fontWeight:600,cursor:isUsed?"not-allowed":"pointer"}}>{w}</button>;
                    })}</div></div>}
                  </div>
                  {q.type!=="order"&&!practiceCheck&&(
                    <input value={practiceAnswer} onChange={function(e){setPracticeAnswer(e.target.value);}} placeholder={q.type==="fill"?"동사를 입력하세요":"영어로 써보세요"} style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:10,padding:"12px 14px",color:C.text,fontSize:14,outline:"none",fontFamily:"inherit",boxSizing:"border-box",marginBottom:10}}/>
                  )}
                  {!practiceCheck?(
                    <button disabled={!practiceAnswer.trim()} onClick={function(){
                      var correct = practiceAnswer.trim().toLowerCase()===q.answer.toLowerCase();
                      setPracticeCheck({correct:correct,answer:q.answer});
                      setPracticeScore(function(s){return{correct:s.correct+(correct?1:0),total:s.total+1};});
                    }} style={{width:"100%",background:practiceAnswer.trim()?C.orange:C.border,color:practiceAnswer.trim()?"#08090d":C.muted,border:"none",borderRadius:12,padding:14,fontSize:14,fontWeight:800,cursor:"pointer"}}>확인</button>
                  ):(

                        <div style={{fontSize:14,fontWeight:700,color:practiceCheck.correct?C.accent:C.red,marginBottom:4}}>{practiceCheck.correct?"정답! 🎉":"오답"}</div>
                        {!practiceCheck.correct&&<div style={{fontSize:13,color:C.text}}>정답: <span style={{fontWeight:700}}>{practiceCheck.answer}</span></div>}
                      </div>
                      {practiceCheck.correct?(

                        }} style={{width:"100%",background:C.accent,color:"#08090d",border:"none",borderRadius:12,padding:14,fontSize:14,fontWeight:800,cursor:"pointer"}}>{isLast?"연습 완료! 🎉":"다음 →"}</button>

                      )}
                    </div>
                  )}
                </div>);
              })()}

              <button onClick={function(){setPracticeMode(false);setResult(null);}} style={{width:"100%",background:"none",border:"1px solid "+C.muted,color:C.text,borderRadius:14,padding:14,fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:10}}>{"← 입력 화면으로"}</button>

            </div>

        </div>

                            {sp.key_nouns.map(function(n,ni){return(
                              <div key={ni} style={{background:C.blue+"15",border:"1px solid "+C.blue+"30",padding:"6px 10px",borderRadius:8}}>
                                <div style={{fontSize:13,fontWeight:800,color:C.blue}}>{n.noun}</div>
                                <div style={{fontSize:10,color:C.muted}}>{n.meaning_ko}</div>
                              </div>
                            );})}
                          </div>
                        </div>
                      )}
                      {sp.verb_compare&&sp.verb_compare.length>0&&(
                        <div style={{marginTop:12,background:C.orange+"10",border:"1px solid "+C.orange+"30",borderRadius:10,padding:12}}>
                          <div style={{fontSize:10,color:C.orange,letterSpacing:1,marginBottom:8,fontWeight:700}}>🔍 헷갈리는 동사 비교</div>
                          {sp.verb_compare.map(function(vc,vi){return(
                            <div key={vi} style={{marginBottom:vi<sp.verb_compare.length-1?10:0}}>
                              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:4}}>
                                {vc.verbs.map(function(v,vvi){return(
                                  <span key={vvi} style={{color:C.orange,fontWeight:800,fontSize:13}}>{v}{vvi<vc.verbs.length-1?" vs":""}</span>
                                );})}
                              </div>
                              <div style={{fontSize:11,color:C.text,lineHeight:1.5}}>{vc.diff_ko}</div>
                            </div>
                          );})}
                        </div>
                      )}
                      {sp.coach_tip&&(
                        <div style={{marginTop:12,background:C.yellowDim,border:"1px solid "+C.yellow+"30",borderRadius:10,padding:12}}>
                          <div style={{fontSize:10,color:C.yellow,letterSpacing:1,marginBottom:6,fontWeight:700}}>COACH'S TIP</div>
                          <div style={{fontSize:12,color:C.text,lineHeight:1.6}}>{sp.coach_tip}</div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );})}
            </div>
          )}
        </div>
      );
    }

    function HistoryScreen(props) {
      var history = props.history;
      if (!history.length) return (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",color:C.muted,gap:12}}>
          <div style={{fontSize:36}}>{"📚"}</div><div style={{fontSize:14}}>아직 학습 기록이 없어요</div>
        </div>
      );
      return (
        <div style={{padding:"24px 20px"}}>
          <div style={{fontSize:11,color:C.muted,letterSpacing:3,marginBottom:8}}>HISTORY</div>
          <div style={{fontSize:22,fontWeight:800,marginBottom:20}}>학습 기록</div>
          {[].concat(history).reverse().map(function(item,i){return(
            <div key={i} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:14,marginBottom:10}}>
              <div style={{fontSize:11,color:C.muted,marginBottom:10}}>{item.date}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {item.verbs?item.verbs.map(function(v,vi){return(
                  <div key={vi} style={{background:(vi%2===0?C.yellowDim:C.accentDim),border:"1px solid "+(vi%2===0?C.yellow:C.accent)+"30",borderRadius:8,padding:"6px 10px"}}>
                    <div style={{fontSize:10,color:vi%2===0?C.yellow:C.accent,marginBottom:2}}>{vi%2===0?"기본":"구동사"}</div>
                    <div style={{fontSize:14,fontWeight:800,color:vi%2===0?C.yellow:C.accent}}>{v}</div>
                  </div>
                );}):(<Fragment>
                  <div style={{flex:1,background:C.yellowDim,border:"1px solid "+C.yellow+"30",borderRadius:8,padding:"8px 10px"}}>
                    <div style={{fontSize:10,color:C.yellow,marginBottom:3}}>기본동사</div>
                    <div style={{fontSize:15,fontWeight:800,color:C.yellow}}>{item.basic}</div>
                  </div>
                  <div style={{flex:1,background:C.accentDim,border:"1px solid "+C.accent+"30",borderRadius:8,padding:"8px 10px"}}>
                    <div style={{fontSize:10,color:C.accent,marginBottom:3}}>구동사</div>
                    <div style={{fontSize:15,fontWeight:800,color:C.accent}}>{item.phrasal}</div>
                  </div>
                </Fragment>)}
              </div>
            </div>
          );})}
        </div>
      );
    }

    // ── ADMIN ───────────────────────────────────────────────────────
    function AdminScreen() {
      var stats = fetchStats();
      var days = Object.keys(stats).sort().reverse();
      return (
        <div style={{padding:"24px 20px"}}>
          <div style={{fontSize:11,color:C.muted,letterSpacing:3,marginBottom:6}}>ADMIN ONLY</div>
          <div style={{fontSize:22,fontWeight:800,marginBottom:20}}>Talkfit 대시보드</div>
          {days.map(function(d){
            var s = stats[d];
            var hasActivity = Object.values(s).some(function(v){return v>0;});
            if (!hasActivity) return null;
            return (
              <div key={d} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:"10px 14px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                <div style={{fontSize:12,color:C.muted,fontWeight:700}}>{d}</div>
                <div style={{display:"flex",gap:10,fontSize:12,color:C.text}}>
                  <span>{s.visit||0}</span>
                  <span>{s.lesson_start||0}</span>
                  <span>{s.lesson_done||0}</span>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ── LOGIN SCREEN ────────────────────────────────────────────────
    function LoginScreen(props) {
      var onLogin = props.onLogin; var loading = props.loading;
      return (
        <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:C.bg,color:C.text,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 20px",textAlign:"center"}}>
          {React.createElement("svg",{width:80,height:80,viewBox:"0 0 512 512",style:{marginBottom:20}},
            React.createElement("rect",{width:512,height:512,rx:112,fill:"#111827"}),
            React.createElement("path",{d:"M140 140 h232 a40 40 0 0 1 40 40 v140 a40 40 0 0 1 -40 40 h-140 l-60 50 v-50 h-32 a40 40 0 0 1 -40 -40 v-140 a40 40 0 0 1 40 -40z",fill:"none",stroke:"#7ee8a2",strokeWidth:16,strokeLinejoin:"round"}),
            React.createElement("text",{x:256,y:300,textAnchor:"middle",fontFamily:"Arial",fontWeight:900,fontSize:160,fill:"#7ee8a2"},"T"),
            React.createElement("circle",{cx:370,cy:170,r:14,fill:"#fbbf24"})
          )}
          <div style={{fontSize:28,fontWeight:900,marginBottom:8,color:C.accent}}>TalkFit</div>
          <div style={{fontSize:14,color:C.muted,marginBottom:8}}>{"쉬운 동사로 다 말한다"}</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:40,lineHeight:1.7}}>{"매일 15분, 미국인이 실제 쓰는"}<br/>{"영어 표현 트레이닝"}</div>
          <button onClick={onLogin} disabled={loading} style={{background:"#fff",color:"#333",border:"none",borderRadius:12,padding:"14px 32px",fontSize:15,fontWeight:700,cursor:loading?"wait":"pointer",display:"flex",alignItems:"center",gap:10,boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}}>
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            {loading ? "로그인 중..." : "Google로 시작하기"}
          </button>
          <div style={{fontSize:11,color:C.muted,marginTop:20,lineHeight:1.6}}>{"로그인하면 기기가 바뀌어도"}<br/>{"학습 기록이 유지돼요"}</div>
          <div style={{marginTop:40,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:900,color:C.accent,letterSpacing:2,marginBottom:4}}>{"TALKFIT"}</div>
            <div style={{fontSize:10,color:C.muted,opacity:0.5}}>{"© 2026 TalkFit. All rights reserved."}</div>
          </div>
        </div>
      );
    }

    // ── APP ─────────────────────────────────────────────────────────
    function App() {
      var _s1=useState("home"); var tab=_s1[0]; var setTab=_s1[1];
      var _s2=useState("home"); var screen=_s2[0]; var setScreen=_s2[1];
      var _s3=useState(null); var lessons=_s3[0]; var setLessons=_s3[1];
      var _s4=useState(false); var todayDone=_s4[0]; var setTodayDone=_s4[1];
      var _s5=useState(0); var streak=_s5[0]; var setStreak=_s5[1];
      var _s6=useState(false); var loading=_s6[0]; var setLoading=_s6[1];
      var _s7=useState([]); var speakHistory=_s7[0]; var setSpeakHistory=_s7[1];
      var _s8=useState([]); var verbHistory=_s8[0]; var setVerbHistory=_s8[1];
      var aiAvailable = true;

      var _authState = useState(null); var user = _authState[0]; var setUser = _authState[1];
      var _authLoading = useState(true); var authLoading = _authLoading[0]; var setAuthLoading = _authLoading[1];
      var _loginLoading = useState(false); var loginLoading = _loginLoading[0]; var setLoginLoading = _loginLoading[1];
      var _aiLeft = useState(aiRemaining); var aiLeft = _aiLeft[0]; var setAiLeft = _aiLeft[1];

      useEffect(function(){ onAiRemainingChange(setAiLeft); }, []);

      var isAdmin = false;
      try { isAdmin = new URLSearchParams(window.location.search).get("admin") === ADMIN_KEY; } catch(e){}

      var todayKey = function(){var d=new Date();d.setHours(d.getHours()+9);return d.toISOString().slice(0,10);};

      useEffect(function() {
        fbAuth.getRedirectResult().catch(function(e){ console.error("Redirect error:", e); });
        var unsub = fbAuth.onAuthStateChanged(function(u) {
          setUser(u);
          setAuthLoading(false);
        });
        return unsub;
      }, []);

      useEffect(function(){
        if (!user) return;
        (async function(){
          var cloudState = await loadCloud(user.uid, "tk_state");
          if (cloudState) {
            setStreak(cloudState.streak||0);
            setVerbHistory(cloudState.history||[]);
            if (cloudState.todayKey===todayKey()) { setTodayDone(cloudState.todayDone||false); if(cloudState.lessons)setLessons(cloudState.lessons); }
            saveLocal("tk_state", cloudState);
          } else {
            var localState = loadLocal("tk_state");
            if (localState) {
              await saveCloud(user.uid, "tk_state", localState);
              setStreak(localState.streak||0);
              setVerbHistory(localState.history||[]);
              if (localState.todayKey===todayKey()) { setTodayDone(localState.todayDone||false); if(localState.lessons)setLessons(localState.lessons); }
            }
          }
          if (!lessons) setLessons(getTodayLesson());

          var cloudSpeak = await loadCloud(user.uid, "speak_history");
          if (cloudSpeak) setSpeakHistory(cloudSpeak);
          else {
            var localSpeak = loadLocal("speak_history");
            if (localSpeak) { setSpeakHistory(localSpeak); await saveCloud(user.uid, "speak_history", localSpeak); }
          }

          var cloudXp = await loadCloud(user.uid, "xp_state");
          if (cloudXp) saveLocal("xp_state", cloudXp);
          else {
            var localXp = loadLocal("xp_state");
            if (localXp) await saveCloud(user.uid, "xp_state", localXp);
          }
        })();
      }, [user]);

      useEffect(function(){
        track("visit");
        var s = loadLocal("tk_state");
        if (s) {
          setStreak(s.streak||0);
          setVerbHistory(s.history||[]);
          if (s.todayKey===todayKey()) { setTodayDone(s.todayDone||false); if(s.lessons)setLessons(s.lessons); }
        }
        if (!lessons) setLessons(getTodayLesson());
        setSpeakHistory(loadLocal("speak_history") || []);
      }, []);

      var persist = function(updates) {
        var cur = loadLocal("tk_state")||{};
        for(var k in updates) cur[k]=updates[k];
        cur.todayKey = todayKey();
        saveLocal("tk_state", cur);
        if (user) saveCloud(user.uid, "tk_state", cur);
      };

      var handleLogin = function() {
        setLoginLoading(true);
        signInWithGoogle().catch(function(e){
          console.error("Login error:", e);
        }).finally(function(){
          setLoginLoading(false);
        });
      };

      var handleStart = function() {
        track("lesson_start");
        if (!lessons) setLessons(getTodayLesson());
        setScreen("learn"); setTab("learn");
      };

      var handleComplete = function() {
        track("lesson_done");
        var newStreak = streak+1;
        var allVerbs = [];
        if (lessons) {
          for (var li = 0; li < lessons.length; li++) {
            allVerbs.push(lessons[li].basic.verb);
            allVerbs.push(lessons[li].phrasal.verb);
          }
        }
        var newHistory = [].concat(verbHistory,[{verbs:allVerbs,date:todayKey()}]);
        setStreak(newStreak); setTodayDone(true); setVerbHistory(newHistory);
        persist({streak:newStreak,todayDone:true,history:newHistory,lessons:lessons});
        if (user) {
          var xpState = loadLocal("xp_state");
          if (xpState) saveCloud(user.uid, "xp_state", xpState);
        }
        setScreen("home"); setTab("home");
      };

      if (authLoading) return (
        <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:C.bg,color:C.text,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:12}}>{"💪"}</div>
            <div style={{color:C.muted,fontSize:14}}>{"로딩 중..."}</div>
          </div>
        </div>
      );

      if (!user) return <LoginScreen onLogin={handleLogin} loading={loginLoading} />;

      function TabIcon(props){
        var c=props.color;var s=props.type;
        if(s==="home")return React.createElement("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:c,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},React.createElement("path",{d:"M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"}));
        if(s==="speak")return React.createElement("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:c,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},React.createElement("path",{d:"M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"}));
        if(s==="review")return React.createElement("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:c,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},React.createElement("polyline",{points:"1 4 1 10 7 10"}),React.createElement("path",{d:"M3.51 15a9 9 0 102.13-9.36L1 10"}));
        if(s==="history")return React.createElement("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:c,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},React.createElement("path",{d:"M4 19.5A2.5 2.5 0 016.5 17H20"}),React.createElement("path",{d:"M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"}));
        return null;
      }
      var TABS = [
        {id:"home",type:"home",label:"홈"},
        {id:"speak",type:"speak",label:"회화"},
        {id:"review",type:"review",label:"복습"},
        {id:"history",type:"history",label:"기록"},
      ];

      return (
        <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:C.bg,color:C.text,display:"flex",flexDirection:"column"}}>
          <div style={{position:"sticky",top:0,zIndex:10,background:C.bg+"ee",backdropFilter:"blur(12px)",borderBottom:"1px solid "+C.border,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontWeight:900,fontSize:16,letterSpacing:-0.5,display:"flex",alignItems:"center",gap:8}}>
              {React.createElement("svg",{width:24,height:24,viewBox:"0 0 512 512"},
                React.createElement("rect",{width:512,height:512,rx:112,fill:"#111827"}),
                React.createElement("path",{d:"M140 140 h232 a40 40 0 0 1 40 40 v140 a40 40 0 0 1 -40 40 h-140 l-60 50 v-50 h-32 a40 40 0 0 1 -40 -40 v-140 a40 40 0 0 1 40 -40z",fill:"none",stroke:"#7ee8a2",strokeWidth:16,strokeLinejoin:"round"}),
                React.createElement("text",{x:256,y:300,textAnchor:"middle",fontFamily:"Arial",fontWeight:900,fontSize:160,fill:"#7ee8a2"},"T"),
                React.createElement("circle",{cx:370,cy:170,r:14,fill:"#fbbf24"})
              )}
              <span style={{color:C.accent}}>{"TalkFit"}</span>
            </div>
            {(screen==="learn"||screen==="practice"||screen==="admin"||screen==="speak"||screen==="roleplay"||screen==="chat")&&(
              <button onClick={function(){setScreen("home");setTab("home");}} style={{background:C.surface,border:"1px solid "+C.border,color:C.muted,borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer"}}>{"← 홈"}</button>
            )}
            {screen==="home"&&user&&(
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {isAdmin && <button onClick={function(){setScreen("admin");}} style={{background:C.yellowDim,border:"1px solid "+C.yellow+"40",color:C.yellow,borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer",fontWeight:700}}>{"📊"}</button>}
                <div style={{fontSize:10,color:aiLeft<=5?C.red:C.muted,background:aiLeft<=5?C.red+"15":C.surface,border:"1px solid "+(aiLeft<=5?C.red+"40":C.border),borderRadius:6,padding:"2px 6px"}}>{"AI "+aiLeft+"/100"}</div>
                <div style={{fontSize:12,color:C.muted}}>{streak}{"🔥"}</div>
                {user.photoURL && <img src={user.photoURL} style={{width:24,height:24,borderRadius:"50%",cursor:"pointer"}} onClick={function(){if(confirm("로그아웃 하시겠어요?"))signOutUser();}} title="로그아웃" referrerPolicy="no-referrer"/>}
              </div>
            )}
          </div>

          <div style={{flex:1,overflowY:"auto",paddingBottom:90}}>
            {screen==="home"&&<HomeScreen streak={streak} todayDone={todayDone} lessons={lessons} onStart={handleStart} onSpeak={function(){setScreen("speak");setTab("speak");}} onChat={function(){setScreen("chat");}}/>}
            {screen==="learn"&&<LearnScreen lessons={lessons} loading={loading} onNext={function(){setScreen("roleplay");}} aiAvailable={aiAvailable}/>}
            {screen==="roleplay"&&<RoleplayScreen lessons={lessons} onNext={function(){setScreen("practice");}}/>}
            {screen==="practice"&&<PracticeScreen lessons={lessons} onComplete={handleComplete} aiAvailable={aiAvailable}/>}
            {screen==="review"&&<ReviewScreen lessons={lessons} speakHistory={speakHistory}/>}
            {screen==="history"&&<HistoryScreen history={verbHistory}/>}
            {screen==="speak"&&<SpeakScreen history={speakHistory} setHistory={function(h){setSpeakHistory(h);saveLocal("speak_history",h);if(user)saveCloud(user.uid,"speak_history",h);}} onHome={function(){setScreen("home");setTab("home");}} aiAvailable={aiAvailable}/>}
            {screen==="chat"&&<ChatScreen onHome={function(){setScreen("home");setTab("home");}}/>}
            {screen==="admin"&&<AdminScreen/>}
          </div>

          {screen!=="practice"&&screen!=="admin"&&screen!=="chat"&&(
            <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:C.surface+"f0",backdropFilter:"blur(20px)",borderTop:"1px solid "+C.border,display:"flex",padding:"10px 0 20px",zIndex:20}}>
              {TABS.map(function(t){return(
                <button key={t.id} onClick={function(){setTab(t.id);setScreen(t.id);}} style={{flex:1,background:"none",border:"none",color:tab===t.id?C.accent:C.muted,cursor:"pointer",padding:"6px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <TabIcon type={t.type} color={tab===t.id?C.accent:C.muted}/>
                  <div style={{fontSize:10,fontWeight:tab===t.id?700:400}}>{t.label}</div>
                  {!t.action&&tab===t.id&&<div style={{width:4,height:4,borderRadius:"50%",background:C.accent}}/>}
                </button>
              );})}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
