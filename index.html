  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;

    // ── CONFIG ──────────────────────────────────────────────────────
    const ADMIN_KEY = "ys2026";
    const FEEDBACK_FORM_URL = "https://forms.gle/REPLACE_WITH_YOUR_FORM";
    const CREATOR_NAME = "by yoonsoo";

    // ── STORAGE (localStorage wrapper) ──────────────────────────────
    function load(key) {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; }
    }
    function save(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    }

    // ── API KEY MANAGEMENT ──────────────────────────────────────────
    function getApiKey() { return localStorage.getItem("claude_api_key") || ""; }
    function setApiKey(k) { localStorage.setItem("claude_api_key", k); }
    function clearApiKey() { localStorage.removeItem("claude_api_key"); }

    async function callClaude(system, user) {
      const key = getApiKey();
      if (!key) throw new Error("No API key");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": key,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1200,
          system,
          messages: [{ role: "user", content: user }],
        }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `API error ${res.status}`);
      }
      const data = await res.json();
      return data.content?.[0]?.text || "";
    }

    // ── ANALYTICS (localStorage) ────────────────────────────────────
    function track(event) {
      const today = new Date().toISOString().slice(0, 10);
      const key = `stat:${today}:${event}`;
      const count = (load(key) || 0) + 1;
      save(key, count);
    }

    function fetchStats() {
      const days = [];
      for (let i = 0; i < 14; i++) {
        const d = new Date(); d.setDate(d.getDate() - i);
        days.push(d.toISOString().slice(0, 10));
      }
      const events = ["visit","lesson_start","lesson_done","reaction_good","reaction_mid","reaction_bad","feedback_click","login_attempt"];
      const result = {};
      for (const day of days) {
        result[day] = {};
        for (const e of events) result[day][e] = load(`stat:${day}:${e}`) || 0;
      }
      return result;
    }

      },

    function getTodayLesson() {
      const dayIndex = Math.floor(Date.now() / 86400000) % LESSON_POOL.length;
      return LESSON_POOL[dayIndex];
    }

    const C = {
      bg:"#08090d", surface:"#10121a", border:"#1e2130",
      accent:"#7ee8a2", accentDim:"#7ee8a215",
      blue:"#60a5fa", blueDim:"#60a5fa15",
      yellow:"#fbbf24", yellowDim:"#fbbf2415",
      orange:"#fb923c", red:"#f87171",
      text:"#e8eaf0", muted:"#4a5068",
    };

    // ── API KEY SCREEN ──────────────────────────────────────────────
    function ApiKeyScreen({ onSave, onSkip }) {
      const [key, setKey] = useState("");
      const [testing, setTesting] = useState(false);
      const [error, setError] = useState("");

      const testAndSave = async () => {
        if (!key.trim()) return;
        setTesting(true); setError("");
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": key.trim(),
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:10, messages:[{role:"user",content:"hi"}] }),
          });
          if (res.ok) { setApiKey(key.trim()); onSave(); }
          else { const d = await res.json().catch(()=>({})); setError(d.error?.message || "API 키가 유효하지 않아요."); }
        } catch(e) { setError("연결 실패: " + e.message); }
        setTesting(false);
      };

      return (
        <div className="screen-enter" style={{ padding:"40px 20px", textAlign:"center" }}>
          <div style={{ fontSize:48, marginBottom:16 }}>🔑</div>
          <div style={{ fontSize:22, fontWeight:800, marginBottom:8 }}>AI 기능 연결</div>
          <div style={{ fontSize:13, color:C.muted, lineHeight:1.7, marginBottom:24 }}>
            문장 교정, 회화 코치 기능을 쓰려면<br/>본인의 Claude API 키가 필요해요.
          </div>
          <div style={{ textAlign:"left", marginBottom:20 }}>
            <div style={{ fontSize:12, color:C.muted, marginBottom:6 }}>Claude API Key</div>
            <input
              type="password" value={key} onChange={e=>setKey(e.target.value)}
              placeholder="sk-ant-api03-..."
              style={{ width:"100%", background:C.surface, border:`1px solid ${C.border}`, borderRadius:12, padding:"14px 16px", color:C.text, fontSize:14, outline:"none" }}
              onKeyDown={e=>e.key==="Enter"&&testAndSave()}
            />
            {error && <div style={{ fontSize:12, color:C.red, marginTop:8 }}>{error}</div>}
          </div>
          <button onClick={testAndSave} disabled={testing||!key.trim()} style={{ width:"100%", background:C.accent, color:"#08090d", border:"none", borderRadius:14, padding:16, fontSize:15, fontWeight:800, cursor:"pointer", opacity:testing?0.6:1, marginBottom:12 }}>
            {testing ? "연결 확인 중..." : "연결하기"}
          </button>
          <button onClick={onSkip} style={{ background:"none", border:"none", color:C.muted, fontSize:13, cursor:"pointer", textDecoration:"underline" }}>
            체험 모드로 먼저 볼게요
          </button>
          <div style={{ marginTop:24, background:C.surface, border:`1px solid ${C.border}`, borderRadius:12, padding:16, textAlign:"left" }}>
            <div style={{ fontSize:12, color:C.accent, fontWeight:700, marginBottom:8 }}>API 키 받는 법</div>
            <ol style={{ fontSize:12, color:C.muted, lineHeight:1.8, paddingLeft:16 }}>
              <li>console.anthropic.com 가입</li>
              <li>Settings &gt; API Keys 에서 키 생성</li>
              <li>위에 붙여넣기</li>
            </ol>
            <div style={{ fontSize:11, color:C.muted, marginTop:8, opacity:0.7 }}>
              키는 이 기기의 브라우저에만 저장돼요. 서버로 전송되지 않습니다.
            </div>
          </div>
        </div>
      );
    }

    // ── HOME ────────────────────────────────────────────────────────
    function HomeScreen({ streak, todayDone, lesson, onStart, aiAvailable, onEnableAI }) {
      const days = ["S","M","T","W","T","F","S"];
      const today = new Date().getDay();
      const hour = new Date().getHours();
      const greeting = hour < 5 ? { t:"Still up? \u{1F319}", s:"자기 전 영어 한 입 어때요" }
        : hour < 12 ? { t:"Good morning \u{1F44B}", s:"매일 15분, 미국식 영어 트레이닝 \u{1F4AA}" }
        : hour < 18 ? { t:"Good afternoon \u{2600}\u{FE0F}", s:"점심 쉬는 틈에 영어 한 입 \u{1F96A}" }
        : hour < 22 ? { t:"Good evening \u{1F306}", s:"오늘 하루 마무리 15분 \u{1F4AA}" }
        : { t:"Late night study \u{1F319}", s:"집중 잘 되는 시간이죠" };
      return (
        <div className="screen-enter" style={{ padding:"32px 20px 24px" }}>
          <div style={{ fontSize:12,color:C.muted,letterSpacing:3,marginBottom:6 }}>
            {new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}).toUpperCase()}
          </div>
          <div style={{ fontSize:28,fontWeight:800,lineHeight:1.2,marginBottom:4 }}>{greeting.t}</div>
          <div style={{ fontSize:14,color:C.muted,marginBottom:20 }}>{greeting.s}</div>

          {!aiAvailable && (
            <div style={{ background:C.blueDim, border:`1px solid ${C.blue}40`, borderRadius:12, padding:"14px 16px", marginBottom:20 }}>
              <div style={{ fontSize:12, color:C.blue, lineHeight:1.6, marginBottom:12 }}>
                \u{1F440} <b>체험 모드</b>예요. 샘플 레슨부터 둘러보시고, AI 피드백 기능을 쓰시려면 API 키를 연결해주세요.
              </div>
              <button onClick={onEnableAI} style={{ width:"100%", background:C.blue, color:"#08090d", border:"none", borderRadius:10, padding:"10px 14px", fontSize:13, fontWeight:800, cursor:"pointer" }}>
                \u{1F511} API 키 연결하기
              </button>
            </div>
          )}

          <div style={{ background:`linear-gradient(135deg,${C.accent}18,${C.blue}10)`,border:`1px solid ${C.accent}30`,borderRadius:16,padding:20,marginBottom:16 }}>
            <div style={{ fontSize:11,color:C.accent,letterSpacing:3,marginBottom:6 }}>STREAK</div>

            <div style={{ fontSize:12,color:C.muted,marginTop:4 }}>연속 학습일</div>
            <div style={{ display:"flex",gap:6,marginTop:16 }}>

                <div key={i} style={{ textAlign:"center" }}>

                    {i<today?"\u2713":i===today&&todayDone?"\u2713":""}

            </div>

          {lesson&&(

              <div style={{ flex:1,background:C.surface,border:`1px solid ${C.yellow}40`,borderRadius:12,padding:"10px 14px" }}>
                <div style={{ fontSize:10,color:C.yellow,letterSpacing:2,marginBottom:4 }}>기본동사</div>
                <div style={{ fontSize:16,fontWeight:800,color:C.yellow }}>{lesson.basic?.verb}</div>
                <div style={{ fontSize:11,color:C.muted,marginTop:2 }}>{lesson.basic?.meaning_ko?.split(",")[0]}</div>
              </div>
              <div style={{ flex:1,background:C.surface,border:`1px solid ${C.accent}40`,borderRadius:12,padding:"10px 14px" }}>
                <div style={{ fontSize:10,color:C.accent,letterSpacing:2,marginBottom:4 }}>구동사</div>
                <div style={{ fontSize:16,fontWeight:800,color:C.accent }}>{lesson.phrasal?.verb}</div>
                <div style={{ fontSize:11,color:C.muted,marginTop:2 }}>{lesson.phrasal?.meaning_ko?.split(",")[0]}</div>
              </div>
            </div>
          )}

          {todayDone?(
            <div style={{ background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:20,textAlign:"center" }}>
              <div style={{ fontSize:24,marginBottom:8 }}>\u2705</div>
              <div style={{ fontWeight:700,marginBottom:4 }}>오늘 완료!</div>
              <div style={{ fontSize:12,color:C.muted }}>내일 또 만나요 \u{1F305}</div>
            </div>
          ):(
            <button onClick={onStart} style={{ width:"100%",background:C.accent,color:"#08090d",border:"none",borderRadius:16,padding:18,fontSize:16,fontWeight:800,cursor:"pointer",boxShadow:`0 8px 32px ${C.accent}40` }}>
              {lesson?"\u{1F4D6} 오늘 학습 시작":"\u2728 오늘의 레슨 받기"}
            </button>
          )}

          <div style={{ display:"flex",gap:10,marginTop:14 }}>
            {[{label:"학습한 날",value:`${streak}일`},{label:"오늘 학습",value:"2가지"}].map((s,i)=>(
              <div key={i} style={{ flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px" }}>
                <div style={{ fontSize:18,fontWeight:800 }}>{s.value}</div>
                <div style={{ fontSize:11,color:C.muted,marginTop:2 }}>{s.label}</div>
              </div>
            ))}

          {aiAvailable && (

              API 키 초기화
            </button>

          <div style={{ marginTop:28, paddingTop:20, borderTop:`1px solid ${C.border}`, textAlign:"center" }}>
            <div style={{ fontSize:10, color:C.muted, opacity:0.6 }}>{CREATOR_NAME} · beta v0.1</div>
          </div>
        </div>

    // ── LEARN ───────────────────────────────────────────────────────
    function LearnScreen({ lesson, loading, onNext, aiAvailable }) {
      const [phase, setPhase] = useState("basic");
      const [step, setStep] = useState(0);

      if (loading) return (
        <div style={{ display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",gap:16 }}>
          <div style={{ fontSize:36 }}>\u2728</div>
          <div style={{ color:C.muted,fontSize:14 }}>오늘의 레슨 준비 중...</div>
          <div style={{ display:"flex",gap:6 }}>
            {[0,1,2].map(i=><div key={i} style={{ width:8,height:8,borderRadius:"50%",background:C.accent,animation:`dot ${0.6+i*0.2}s ease-in-out infinite alternate` }}/>)}
          </div>
        </div>
      );
      if (!lesson) return null;

      const current = phase==="basic" ? lesson.basic : lesson.phrasal;
      const color = phase==="basic" ? C.yellow : C.accent;

      const goNext = () => {
        if (step<2) { setStep(s=>s+1); return; }
        if (phase==="basic") { setPhase("phrasal"); setStep(0); return; }
        onNext();
      };

      const btnLabel = step<2 ? "다음 \u2192" : phase==="basic" ? "구동사 학습하기 \u2192" : (aiAvailable ? "\u270D\u{FE0F} 내 문장 쓰러 가기" : "\u{1F389} 오늘 학습 완료");

      return (
        <div className="screen-enter" style={{ padding:"24px 20px" }}>
          <div style={{ display:"flex",gap:8,marginBottom:20 }}>
            {[{id:"basic",label:"\u{1F4D2} 기본동사",color:C.yellow},{id:"phrasal",label:"\u{1F4D7} 구동사",color:C.accent}].map(t=>(
              <div key={t.id} style={{ flex:1,padding:"9px 0",borderRadius:10,textAlign:"center",background:phase===t.id?t.color+"20":C.surface,border:`1px solid ${phase===t.id?t.color+"60":C.border}`,fontSize:12,fontWeight:700,color:phase===t.id?t.color:C.muted,cursor:"pointer" }}
                onClick={()=>{ if(t.id==="basic"){setPhase("basic");setStep(0);} }}>
                {phase==="phrasal"&&t.id==="basic"?"\u2713 완료":t.label}
              </div>
            ))}
          </div>

          <div style={{ display:"flex",gap:5,marginBottom:24 }}>
            {["뜻","예문","패턴"].map((s,i)=>(
              <div key={i} style={{ flex:1,height:3,borderRadius:99,background:i<=step?color:C.border,transition:"background 0.3s" }}/>
            ))}
          </div>

          {step===0&&(
            <div>
              <div style={{ display:"inline-block",padding:"3px 12px",borderRadius:99,background:color+"20",color,fontSize:11,fontWeight:700,letterSpacing:2,border:`1px solid ${color}40`,marginBottom:16 }}>
                {phase==="basic"?"기본동사":"구동사"}
              </div>
              <div style={{ fontSize:44,fontWeight:900,color,marginBottom:8,letterSpacing:-1 }}>{current.verb}</div>
              <div style={{ fontSize:18,color:C.text,marginBottom:6,fontWeight:600 }}>{current.meaning_ko}</div>
              <div style={{ fontSize:14,color:C.muted,marginBottom:24,lineHeight:1.6 }}>{current.meaning_en}</div>
              {current.meanings?.length>0&&(
                <div style={{ background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:20 }}>
                  <div style={{ fontSize:11,color:C.muted,letterSpacing:2,marginBottom:12 }}>주요 의미 {current.meanings.length}가지</div>
                  {current.meanings.map((m,i)=>(
                    <div key={i} style={{ display:"flex",gap:10,marginBottom:10,alignItems:"flex-start" }}>
                      <span style={{ background:color+"20",color,borderRadius:6,padding:"2px 8px",fontSize:12,fontWeight:700,flexShrink:0,marginTop:2 }}>{i+1}</span>
                      <div>
                        <div style={{ fontSize:13,color:C.text,fontWeight:600 }}>{m.meaning}</div>
                        <div style={{ fontSize:12,color:C.muted,marginTop:2,fontStyle:"italic" }}>"{m.example}"</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {step===1&&(
            <div>
              <div style={{ fontSize:11,color:C.muted,letterSpacing:3,marginBottom:12 }}>REAL EXAMPLES</div>
              <div style={{ fontSize:20,fontWeight:800,marginBottom:16 }}>미국인이 실제로 쓰는 문장</div>
              {current.examples?.map((ex,i)=>(
                <div key={i} style={{ background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:12 }}>
                  <div style={{ fontSize:11,color:C.muted,marginBottom:8 }}>상황 {i+1}: {ex.situation}</div>
                  <div style={{ fontSize:15,color:C.text,fontWeight:600,marginBottom:6,lineHeight:1.5 }}>
                    {ex.english.split(new RegExp(`(${current.verb.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, "i")).map((p,j)=>
                      p.toLowerCase()===current.verb.toLowerCase()
                        ?<span key={j} style={{ color,textDecoration:"underline" }}>{p}</span>:p
                    )}
                  </div>
                  <div style={{ fontSize:13,color:C.muted }}>{ex.korean}</div>
                </div>
              ))}
            </div>
          )}

          {step===2&&(
            <div>
              <div style={{ fontSize:11,color:C.muted,letterSpacing:3,marginBottom:12 }}>SENTENCE PATTERN</div>
              <div style={{ background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:12 }}>
                <div style={{ fontSize:12,color:C.red,marginBottom:8 }}>\u274C 어색해요</div>
                <div style={{ fontSize:14,color:C.red,padding:"10px 12px",background:C.red+"10",borderRadius:8,fontStyle:"italic" }}>"{current.bad_example}"</div>
              </div>
              <div style={{ background:C.surface,border:`1px solid ${color}40`,borderRadius:12,padding:16,marginBottom:16 }}>
                <div style={{ fontSize:12,color,marginBottom:8 }}>\u2705 자연스러워요</div>
                <div style={{ fontSize:14,color:C.text,padding:"10px 12px",background:color+"10",borderRadius:8,lineHeight:1.6 }}>"{current.good_example}"</div>
              </div>
              <div style={{ background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:20 }}>
                <div style={{ fontSize:11,color:C.muted,marginBottom:6,letterSpacing:2 }}>PRACTICE HINT</div>
                <div style={{ fontSize:13,color:C.text,lineHeight:1.7 }}>{current.practice_hint}</div>
              </div>
            </div>
          )}

          <button onClick={goNext} style={{ width:"100%",background:color,color:"#08090d",border:"none",borderRadius:14,padding:16,fontSize:15,fontWeight:800,cursor:"pointer" }}>
            {btnLabel}
          </button>
        </div>
      );
    }

    // ── PRACTICE ────────────────────────────────────────────────────
    function PracticeScreen({ lesson, onComplete, aiAvailable }) {
      const [activeVerb, setActiveVerb] = useState("basic");
      const [sentences, setSentences] = useState({ basic:["",""], phrasal:["",""] });
      const [feedback, setFeedback] = useState({ basic:null, phrasal:null });
      const [loading, setLoading] = useState({ basic:false, phrasal:false });
      const [done, setDone] = useState(false);

      if (!aiAvailable) {
        return (
          <div className="screen-enter" style={{ padding:"40px 20px", textAlign:"center" }}>
            <div style={{ fontSize:48, marginBottom:16 }}>\u{1F512}</div>
            <div style={{ fontSize:20, fontWeight:800, marginBottom:8 }}>문장 피드백은 API 키 연결 후</div>
            <div style={{ fontSize:13, color:C.muted, lineHeight:1.7, marginBottom:24 }}>
              직접 쓴 문장을 미국인이 쓰는 자연스러운 표현으로<br/>AI가 실시간 교정해줘요.
            </div>
            <button onClick={onComplete} style={{ background:"none", border:"none", color:C.muted, fontSize:13, marginTop:16, cursor:"pointer", textDecoration:"underline" }}>
              오늘은 여기까지, 내일 봐요 \u2192
            </button>
          </div>
        );
      }

      const color = activeVerb==="basic" ? C.yellow : C.accent;
      const current = activeVerb==="basic" ? lesson.basic : lesson.phrasal;
      const fb = feedback[activeVerb];
      const sent = sentences[activeVerb];
      const bothDone = feedback.basic && feedback.phrasal;

      const handleSubmit = async (type) => {
        const filled = sentences[type].filter(s=>s.trim().length>4);
        if (!filled.length) return;
        setLoading(l=>({...l,[type]:true}));
        const v = type==="basic" ? lesson.basic : lesson.phrasal;
        const system = `You are an American English tutor. Return ONLY valid JSON:
{"overall":"전체 피드백(한국어,2문장)","corrections":[{"original":"...","corrected":"...","explanation":"왜(한국어)","more_natural":"더 자연스럽게(optional)"}],"bonus":"미국인이 쓸 법한 추가 문장(영어)"}`;
        try {
          const raw = await callClaude(system, `Verb: "${v.verb}" (${v.meaning_ko})\nSentences:\n${filled.map((s,i)=>`${i+1}. ${s}`).join("\n")}`);
          setFeedback(f=>({...f,[type]:JSON.parse(raw.replace(/```json|```/g,"").trim())}));
        } catch(e) { setFeedback(f=>({...f,[type]:{overall:"오류: " + e.message,corrections:[],bonus:""}})); }
        setLoading(l=>({...l,[type]:false}));
      };

      if (done) return (
        <div className="screen-enter" style={{ display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"70vh",padding:24,textAlign:"center" }}>
          <div style={{ fontSize:64,marginBottom:16 }}>\u{1F389}</div>
          <div style={{ fontSize:26,fontWeight:900,marginBottom:8 }}>오늘 완료!</div>
          <div style={{ fontSize:14,color:C.muted,marginBottom:16,lineHeight:1.8 }}>
            <span style={{ color:C.yellow,fontWeight:700 }}>"{lesson.basic.verb}"</span> + <span style={{ color:C.accent,fontWeight:700 }}>"{lesson.phrasal.verb}"</span><br/>둘 다 마스터! \u{1F525}
          </div>
          <div style={{ display:"flex", gap:10, marginBottom:20 }}>
            {[{e:"\u{1F603}",k:"reaction_good",l:"좋았어요"},{e:"\u{1F610}",k:"reaction_mid",l:"그냥그래요"},{e:"\u{1F61E}",k:"reaction_bad",l:"별로였어요"}].map(r=>(
              <button key={r.k} onClick={()=>{track(r.k); onComplete();}} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:12, padding:"14px 16px", cursor:"pointer", display:"flex", flexDirection:"column", gap:4, alignItems:"center", minWidth:72 }}>
                <span style={{ fontSize:24 }}>{r.e}</span>
                <span style={{ fontSize:10, color:C.muted }}>{r.l}</span>
              </button>
            ))}
          </div>
          <button onClick={onComplete} style={{ background:C.accent,color:"#08090d",border:"none",borderRadius:14,padding:"16px 40px",fontSize:15,fontWeight:800,cursor:"pointer" }}>홈으로</button>
        </div>
      );

      return (
        <div className="screen-enter" style={{ padding:"24px 20px" }}>
          <div style={{ display:"flex",gap:8,marginBottom:20 }}>
            {[{id:"basic",label:"기본동사",color:C.yellow,verb:lesson.basic.verb},{id:"phrasal",label:"구동사",color:C.accent,verb:lesson.phrasal.verb}].map(t=>(
              <div key={t.id} onClick={()=>setActiveVerb(t.id)} style={{ flex:1,padding:"10px",borderRadius:10,textAlign:"center",cursor:"pointer",background:activeVerb===t.id?t.color+"20":C.surface,border:`1px solid ${activeVerb===t.id?t.color+"60":C.border}` }}>
                <div style={{ fontSize:10,color:activeVerb===t.id?t.color:C.muted,letterSpacing:2,marginBottom:3 }}>{t.label}</div>
                <div style={{ fontSize:14,fontWeight:800,color:activeVerb===t.id?t.color:C.muted }}>{t.verb}</div>
                {feedback[t.id]&&<div style={{ fontSize:10,color:t.color,marginTop:3 }}>\u2713 완료</div>}
              </div>
            ))}
          </div>

          <div style={{ background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:16 }}>
            <div style={{ fontSize:11,color:C.muted,marginBottom:4,letterSpacing:2 }}>HINT</div>
            <div style={{ fontSize:13,color:C.text,lineHeight:1.6 }}>{current.practice_hint}</div>
          </div>

          {sent.map((s,i)=>(
            <div key={i} style={{ marginBottom:12 }}>
              <div style={{ fontSize:12,color:C.muted,marginBottom:6 }}>문장 {i+1}</div>
              <textarea value={s} onChange={e=>{if(fb)return;const n={...sentences,[activeVerb]:[...sentences[activeVerb]]};n[activeVerb][i]=e.target.value;setSentences(n);}}
                rows={3} style={{ width:"100%",background:C.surface,border:`1px solid ${s.trim()?color+"60":C.border}`,borderRadius:12,padding:14,color:C.text,fontSize:14,lineHeight:1.6,resize:"none",outline:"none",fontFamily:"inherit",boxSizing:"border-box",opacity:fb?0.6:1 }}
              />
            </div>
          ))}

          {!fb&&(
            <button onClick={()=>handleSubmit(activeVerb)} disabled={loading[activeVerb]||sent.every(s=>!s.trim())} style={{ width:"100%",background:sent.some(s=>s.trim())?color:C.border,color:sent.some(s=>s.trim())?"#08090d":C.muted,border:"none",borderRadius:14,padding:16,fontSize:15,fontWeight:800,cursor:"pointer",marginBottom:16 }}>
              {loading[activeVerb]?"\u2728 교정 중...":"제출하고 교정 받기 \u2192"}
            </button>
          )}

          {fb&&(
            <div>
              <div style={{ background:color+"15",border:`1px solid ${color}30`,borderRadius:12,padding:16,marginBottom:12 }}>
                <div style={{ fontSize:11,color,letterSpacing:2,marginBottom:6 }}>OVERALL</div>
                <div style={{ fontSize:14,color:C.text,lineHeight:1.6 }}>{fb.overall}</div>
              </div>
              {fb.corrections?.map((c,i)=>(
                <div key={i} style={{ background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:10 }}>
                  <div style={{ fontSize:11,color:C.muted,marginBottom:6 }}>문장 {i+1}</div>
                  {c.original!==c.corrected&&<div style={{ fontSize:13,color:C.red,textDecoration:"line-through",marginBottom:4,opacity:0.7 }}>{c.original}</div>}
                  <div style={{ fontSize:14,color,fontWeight:600,marginBottom:6 }}>\u2713 {c.corrected}</div>
                  <div style={{ fontSize:12,color:C.muted }}>{c.explanation}</div>
                  {c.more_natural&&<div style={{ marginTop:8,padding:"8px 10px",background:C.blueDim,borderRadius:8,fontSize:12,color:C.blue }}>\u{1F4A1} {c.more_natural}</div>}
                </div>
              ))}
              {fb.bonus&&(
                <div style={{ background:C.surface,border:`1px solid ${C.orange}40`,borderRadius:12,padding:14,marginBottom:16 }}>
                  <div style={{ fontSize:11,color:C.orange,letterSpacing:2,marginBottom:6 }}>BONUS</div>
                  <div style={{ fontSize:14,color:C.text,fontStyle:"italic" }}>"{fb.bonus}"</div>
                </div>
              )}
              {!bothDone?(
                <button onClick={()=>setActiveVerb(activeVerb==="basic"?"phrasal":"basic")} style={{ width:"100%",background:activeVerb==="basic"?C.accent:C.yellow,color:"#08090d",border:"none",borderRadius:14,padding:16,fontSize:15,fontWeight:800,cursor:"pointer" }}>
                  {activeVerb==="basic"?"구동사 문장 쓰기 \u2192":"기본동사 문장 쓰기 \u2192"}
                </button>
              ):(
                <button onClick={()=>setDone(true)} style={{ width:"100%",background:C.accent,color:"#08090d",border:"none",borderRadius:14,padding:16,fontSize:15,fontWeight:800,cursor:"pointer" }}>\u{1F389} 오늘 완료!</button>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── SPEAK ───────────────────────────────────────────────────────
    function SpeakScreen({ history, setHistory, aiAvailable }) {
      const [subMode, setSubMode] = useState("solo");
      const supported = typeof window!=="undefined"&&("webkitSpeechRecognition" in window||"SpeechRecognition" in window);

      if (!aiAvailable) {
        return (
          <div className="screen-enter" style={{ padding:"40px 20px", textAlign:"center" }}>
            <div style={{ fontSize:48, marginBottom:16 }}>\u{1F512}</div>
            <div style={{ fontSize:20, fontWeight:800, marginBottom:8 }}>회화 코치는 API 키 연결 후</div>
            <div style={{ fontSize:13, color:C.muted, lineHeight:1.7, marginBottom:24 }}>
              친구와 나눈 한국어 대화를 미국인이 실제 쓰는<br/>자연스러운 영어로 턴별로 바꿔드려요.
            </div>
          </div>
        );
      }

      if (!supported) return (
        <div style={{ padding:40,textAlign:"center",color:C.muted }}>
          <div style={{ fontSize:32,marginBottom:12 }}>\u{1F622}</div>
          <div style={{ fontSize:14,lineHeight:1.7 }}>이 브라우저는 음성 인식을 지원하지 않아요.<br/>Chrome, Safari, 또는 Edge에서 열어주세요.</div>
        </div>
      );

      return (
        <div className="screen-enter" style={{ padding:"24px 20px" }}>
          <div style={{ fontSize:11,color:C.muted,letterSpacing:3,marginBottom:6 }}>SPEAK COACH</div>
          <div style={{ fontSize:22,fontWeight:800,marginBottom:4 }}>회화 코치</div>
          <div style={{ fontSize:13,color:C.muted,marginBottom:20 }}>
            {subMode==="conversation" ? "친구랑 나눈 한국어 대화 \u2192 미국식 영어로" : "한 문장씩 녹음하고 변환"}
          </div>

          <div style={{ display:"flex",gap:8,marginBottom:20 }}>
            {[{id:"conversation",label:"\u{1F4AC} 대화",desc:"두 사람"},{id:"solo",label:"\u{1F3A4} 혼자",desc:"한 문장"}].map(t=>(
              <div key={t.id} onClick={()=>setSubMode(t.id)} style={{ flex:1,padding:"10px",borderRadius:10,textAlign:"center",cursor:"pointer",background:subMode===t.id?C.accent+"20":C.surface,border:`1px solid ${subMode===t.id?C.accent+"60":C.border}` }}>
                <div style={{ fontSize:13,fontWeight:700,color:subMode===t.id?C.accent:C.text }}>{t.label}</div>

    function SoloMode({ history, setHistory }) {
      const [recording, setRecording] = useState(false);
      const [transcript, setTranscript] = useState("");
      const [interim, setInterim] = useState("");
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const recRef = useRef(null);

      const startRec = () => {
        const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
        const rec = new SR();
        rec.lang="ko-KR"; rec.continuous=true; rec.interimResults=true;
        rec.onresult=(e)=>{
          let fin="",inter="";
          for(let i=e.resultIndex;i<e.results.length;i++){
            if(e.results[i].isFinal)fin+=e.results[i][0].transcript;
            else inter+=e.results[i][0].transcript;
          }
          if(fin)setTranscript(p=>p+fin);
          setInterim(inter);
        };
        rec.onend=()=>{ setRecording(false); setInterim(""); };
        rec.start(); recRef.current=rec;
        setRecording(true); setTranscript(""); setInterim(""); setResult(null);
      };
      const stopRec=()=>{ recRef.current?.stop(); setRecording(false); };
      const reset=()=>{ setTranscript(""); setResult(null); setInterim(""); };

      const translate = async () => {
        const text = transcript.trim();
        if (!text) return;
        setLoading(true);
        const system=`You are an American English coach. Return ONLY valid JSON:
{"korean":"원문","casual":"How an American friend would say this","formal":"Work/school version","key_phrases":[{"phrase":"hang out","meaning":"놀다"}],"tip":"핵심 포인트 한국어 1문장"}`;
        try {
          const raw = await callClaude(system,`한국어: "${text}"\n미국식으로 변환해줘.`);
          const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
          setResult(parsed);
          const next=[{...parsed,id:Date.now()},...history].slice(0,50);
          setHistory(next); save("speak_history",next);
        } catch(e) { setResult({korean:text,casual:"오류: "+e.message,formal:"",key_phrases:[],tip:""}); }
        setLoading(false);
      };

      return (
        <div>
          <div style={{ display:"flex",flexDirection:"column",alignItems:"center",marginBottom:24 }}>
            <div style={{ position:"relative" }}>
              {recording&&<React.Fragment>
                <div style={{ position:"absolute",inset:-10,borderRadius:"50%",border:`2px solid ${C.red}`,animation:"pulse1 1.2s ease-out infinite",opacity:0.5 }}/>
                <div style={{ position:"absolute",inset:-20,borderRadius:"50%",border:`2px solid ${C.red}`,animation:"pulse1 1.8s ease-out infinite",opacity:0.25 }}/>
              </React.Fragment>}
              <button onClick={recording?stopRec:startRec} style={{ width:80,height:80,borderRadius:"50%",border:"none",cursor:"pointer",background:recording?C.red:C.accent,color:"#08090d",fontSize:28,boxShadow:recording?`0 0 32px ${C.red}60`:`0 8px 32px ${C.accent}40`,display:"flex",alignItems:"center",justifyContent:"center" }}>
                {recording?"\u23F9":"\u{1F3A4}"}
              </button>
            </div>
            <div style={{ marginTop:14,fontSize:13,color:recording?C.red:C.muted,fontWeight:recording?700:400 }}>
              {recording?"\u25CF 녹음 중... 말해보세요":"탭해서 한국어로 말하기"}
            </div>
          </div>

          {(transcript||interim)&&(
            <div style={{ background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:16 }}>
              <div style={{ fontSize:11,color:C.muted,letterSpacing:2,marginBottom:8 }}>인식된 한국어</div>
              <div style={{ fontSize:15,color:C.text,lineHeight:1.6,minHeight:40 }}>
                {transcript}<span style={{ color:C.muted }}>{interim}</span>
              </div>
            </div>
          )}

          {transcript&&!recording&&!result&&(
            <div style={{ display:"flex",gap:10,marginBottom:20 }}>
              <button onClick={reset} style={{ flex:1,background:C.surface,border:`1px solid ${C.border}`,color:C.muted,borderRadius:12,padding:14,fontSize:14,fontWeight:600,cursor:"pointer" }}>다시 녹음</button>
              <button onClick={translate} disabled={loading} style={{ flex:2,background:C.accent,color:"#08090d",border:"none",borderRadius:12,padding:14,fontSize:14,fontWeight:800,cursor:"pointer" }}>
                {loading?"\u2728 번역 중...":"미국식으로 변환 \u2192"}
              </button>
            </div>
          )}

          {result&&(
            <div>
              <div style={{ background:C.accentDim,border:`1px solid ${C.accent}30`,borderRadius:14,padding:16,marginBottom:12 }}>
                <div style={{ fontSize:11,color:C.accent,letterSpacing:2,marginBottom:8 }}>\u{1F60A} CASUAL \u00B7 친구한테</div>
                <div style={{ fontSize:16,color:C.text,fontWeight:600,lineHeight:1.6 }}>"{result.casual}"</div>
              </div>
              {result.formal&&(
                <div style={{ background:C.surface,border:`1px solid ${C.blue}30`,borderRadius:14,padding:16,marginBottom:12 }}>
                  <div style={{ fontSize:11,color:C.blue,letterSpacing:2,marginBottom:8 }}>\u{1F454} FORMAL \u00B7 학교/직장</div>
                  <div style={{ fontSize:15,color:C.text,fontWeight:500,lineHeight:1.6 }}>"{result.formal}"</div>
                </div>
              )}
              {result.key_phrases?.length>0&&(
                <div style={{ background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:12 }}>
                  <div style={{ fontSize:11,color:C.muted,letterSpacing:2,marginBottom:10 }}>\u{1F511} KEY EXPRESSIONS</div>
                  {result.key_phrases.map((p,i)=>(
                    <div key={i} style={{ display:"flex",alignItems:"center",gap:10,marginBottom:8 }}>
                      <span style={{ background:C.accent+"20",color:C.accent,padding:"3px 10px",borderRadius:99,fontSize:13,fontWeight:700,border:`1px solid ${C.accent}40` }}>{p.phrase}</span>
                      <span style={{ fontSize:13,color:C.muted }}>{p.meaning}</span>
                    </div>
                  ))}
                </div>
              )}
              {result.tip&&(
                <div style={{ background:C.yellowDim,border:`1px solid ${C.yellow}30`,borderRadius:12,padding:14,marginBottom:20 }}>
                  <div style={{ fontSize:11,color:C.yellow,letterSpacing:2,marginBottom:4 }}>\u{1F4A1} TIP</div>
                  <div style={{ fontSize:13,color:C.text,lineHeight:1.6 }}>{result.tip}</div>
                </div>
              )}
              <button onClick={reset} style={{ width:"100%",background:C.surface,border:`1px solid ${C.border}`,color:C.text,borderRadius:14,padding:14,fontSize:14,fontWeight:700,cursor:"pointer" }}>\u{1F3A4} 새 문장</button>
            </div>
          )}
        </div>
      );
    }

    function ConversationMode() {
      const [turns, setTurns] = useState([]);
      const [names, setNames] = useState({ me:"나", other:"상대방" });
      const [speaker, setSpeaker] = useState("me");
      const [recording, setRecording] = useState(false);
      const [transcript, setTranscript] = useState("");
      const [interim, setInterim] = useState("");
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const recRef = useRef(null);

      const startRec = () => {
        const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
        const rec = new SR();
        rec.lang="ko-KR"; rec.continuous=true; rec.interimResults=true;
        rec.onresult=(e)=>{
          let fin="",inter="";
          for(let i=e.resultIndex;i<e.results.length;i++){
            if(e.results[i].isFinal)fin+=e.results[i][0].transcript;
            else inter+=e.results[i][0].transcript;
          }
          if(fin)setTranscript(p=>p+fin);
          setInterim(inter);
        };
        rec.onend=()=>setInterim("");
        rec.start(); recRef.current=rec;
        setRecording(true); setTranscript(""); setInterim("");
      };

      const stopRec = () => {
        recRef.current?.stop();
        setRecording(false);
        const text = transcript.trim();
        if (text) {
          setTurns(t=>[...t,{speaker,text}]);
          setSpeaker(s=>s==="me"?"other":"me");
        }
        setTranscript(""); setInterim("");
      };

      const addText = () => {
        const text = prompt(`${names[speaker]}의 말을 입력:`);
        if (text?.trim()) {
          setTurns(t=>[...t,{speaker,text:text.trim()}]);
          setSpeaker(s=>s==="me"?"other":"me");
        }
      };

      const rename = (who) => {
        const n = prompt(`${who==="me"?"나":"상대방"} 이름:`,names[who]);
        if (n?.trim()) setNames(s=>({...s,[who]:n.trim().slice(0,10)}));
      };

      const removeTurn = (i) => setTurns(t=>t.filter((_,j)=>j!==i));
      const reset = () => { setTurns([]); setResult(null); setSpeaker("me"); };

      const analyze = async () => {
        if (turns.length<2) return;
        setLoading(true);
        const convText = turns.map(t=>`[${t.speaker}] ${names[t.speaker]}: "${t.text}"`).join("\n");
        const system = `You are a friendly American English coach analyzing a Korean conversation between two friends. Return ONLY valid JSON:
{"scenario":"대화 상황 한 문장 요약 (한국어)","turns":[{"speaker":"me"|"other","korean":"원문","english":"미국인 친구가 실제 이 상황에서 쓸 법한 자연스러운 영어 (contractions, filler words 환영)","key_phrases":[{"phrase":"표현","meaning":"한국어 뜻"}]}],"overall_tip":"이 대화에서 미국식 말하기의 포인트 (한국어 2-3문장, 따뜻하고 친절하게)"}
speaker 라벨은 입력의 [me]/[other] 그대로 유지. key_phrases는 각 turn에서 한국인이 배울 만한 표현 0-2개만.`;
        const user = `대화:\n${convText}\n\nturn 순서와 speaker 라벨을 그대로 유지하고, 각 발화를 미국인 친구끼리 실제로 쓸 법한 자연스러운 영어로 바꿔줘.`;
        try {
          const raw = await callClaude(system,user);
          const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
          setResult(parsed);
        } catch(e) { setResult({scenario:"",turns:[],overall_tip:"분석 실패: "+e.message}); }
        setLoading(false);
      };

      if (result) {
        return (
          <div>
            {result.scenario&&(
              <div style={{ background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:16 }}>
                <div style={{ fontSize:11,color:C.muted,letterSpacing:2,marginBottom:6 }}>\u{1F4CD} SITUATION</div>
                <div style={{ fontSize:13,color:C.text,lineHeight:1.6 }}>{result.scenario}</div>
              </div>
            )}
            {result.turns?.map((t,i)=>{
              const isMe = t.speaker==="me";
              const color = isMe?C.accent:C.blue;
              return (
                <div key={i} style={{ marginBottom:14 }}>
                  <div style={{ fontSize:11,color,fontWeight:800,marginBottom:6,display:"flex",alignItems:"center",gap:6 }}>
                    <span style={{ width:6,height:6,borderRadius:"50%",background:color }}/>
                    {names[t.speaker]||(isMe?"나":"상대방")}
                  </div>
                  <div style={{ background:C.surface,border:`1px solid ${color}40`,borderLeft:`3px solid ${color}`,borderRadius:10,padding:14 }}>
                    <div style={{ fontSize:12,color:C.muted,marginBottom:8,fontStyle:"italic" }}>"{t.korean}"</div>
                    <div style={{ fontSize:15,color:C.text,fontWeight:600,lineHeight:1.5 }}>\u{1F4AC} "{t.english}"</div>
                    {t.key_phrases?.length>0&&(
                      <div style={{ marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}` }}>
                        {t.key_phrases.map((p,j)=>(
                          <div key={j} style={{ display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap" }}>
                            <span style={{ background:color+"20",color,padding:"2px 8px",borderRadius:99,fontSize:12,fontWeight:700 }}>{p.phrase}</span>
                            <span style={{ fontSize:12,color:C.muted }}>{p.meaning}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
            {result.overall_tip&&(
              <div style={{ background:C.yellowDim,border:`1px solid ${C.yellow}30`,borderRadius:12,padding:14,marginBottom:20 }}>
                <div style={{ fontSize:11,color:C.yellow,letterSpacing:2,marginBottom:6 }}>\u{1F4A1} COACH'S TIP</div>
                <div style={{ fontSize:13,color:C.text,lineHeight:1.7 }}>{result.overall_tip}</div>
              </div>
            )}
            <button onClick={reset} style={{ width:"100%",background:C.accent,color:"#08090d",border:"none",borderRadius:14,padding:14,fontSize:14,fontWeight:800,cursor:"pointer" }}>\u{1F504} 새 대화 시작</button>
          </div>
        );
      }

      return (
        <div>
          <div style={{ display:"flex",gap:8,marginBottom:14 }}>
            {[{id:"me",c:C.accent},{id:"other",c:C.blue}].map(s=>(
              <div key={s.id} style={{ flex:1 }}>
                <button onClick={()=>setSpeaker(s.id)} disabled={recording} style={{ width:"100%",padding:"10px",borderRadius:10,background:speaker===s.id?s.c+"20":C.surface,border:`1px solid ${speaker===s.id?s.c+"60":C.border}`,color:speaker===s.id?s.c:C.muted,fontSize:13,fontWeight:700,cursor:recording?"not-allowed":"pointer",opacity:recording?0.5:1 }}>
                  {speaker===s.id&&"\u{1F3A4} "}{names[s.id]} 차례
                </button>
                <button onClick={()=>rename(s.id)} disabled={recording} style={{ background:"none",border:"none",color:C.muted,fontSize:10,cursor:"pointer",marginTop:4,width:"100%",opacity:0.7 }}>
                  이름 바꾸기
                </button>
              </div>
            ))}
          </div>

          <div style={{ display:"flex",flexDirection:"column",alignItems:"center",marginBottom:16 }}>
            <div style={{ position:"relative" }}>
              {recording&&<React.Fragment>
                <div style={{ position:"absolute",inset:-10,borderRadius:"50%",border:`2px solid ${C.red}`,animation:"pulse1 1.2s ease-out infinite",opacity:0.5 }}/>
                <div style={{ position:"absolute",inset:-20,borderRadius:"50%",border:`2px solid ${C.red}`,animation:"pulse1 1.8s ease-out infinite",opacity:0.25 }}/>
              </React.Fragment>}
              <button onClick={recording?stopRec:startRec} style={{ width:72,height:72,borderRadius:"50%",border:"none",cursor:"pointer",background:recording?C.red:(speaker==="me"?C.accent:C.blue),color:"#08090d",fontSize:24,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:recording?`0 0 24px ${C.red}60`:`0 4px 20px ${speaker==="me"?C.accent:C.blue}40` }}>
                {recording?"\u23F9":"\u{1F3A4}"}
              </button>
            </div>
            <div style={{ marginTop:10,fontSize:12,color:recording?C.red:C.muted,fontWeight:recording?700:400 }}>
              {recording?`\u25CF ${names[speaker]} 말하는 중...`:"탭해서 녹음"}
            </div>
            {!recording&&(
              <button onClick={addText} style={{ marginTop:6,background:"none",border:"none",color:C.muted,fontSize:11,cursor:"pointer",textDecoration:"underline" }}>
                또는 직접 타이핑
              </button>
            )}
          </div>

          {recording&&(transcript||interim)&&(
            <div style={{ background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:12,marginBottom:14 }}>
              <div style={{ fontSize:11,color:C.muted,marginBottom:6 }}>인식 중...</div>
              <div style={{ fontSize:14,color:C.text,lineHeight:1.5 }}>
                {transcript}<span style={{ color:C.muted }}>{interim}</span>
              </div>
            </div>
          )}

          {turns.length>0&&(
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:11,color:C.muted,letterSpacing:2,marginBottom:8 }}>\u{1F4DD} 대화 ({turns.length})</div>
              {turns.map((t,i)=>{
                const isMe = t.speaker==="me";
                const color = isMe?C.accent:C.blue;
                return (
                  <div key={i} style={{ background:C.surface,border:`1px solid ${C.border}`,borderLeft:`3px solid ${color}`,borderRadius:8,padding:"10px 12px",marginBottom:6,display:"flex",gap:8 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:10,color,fontWeight:700,marginBottom:3 }}>{names[t.speaker]}</div>
                      <div style={{ fontSize:13,color:C.text,lineHeight:1.5 }}>{t.text}</div>
                    </div>
                    <button onClick={()=>removeTurn(i)} disabled={recording} style={{ background:"none",border:"none",color:C.muted,fontSize:18,cursor:"pointer",padding:0,opacity:0.5,alignSelf:"flex-start" }}>\u00D7</button>
                  </div>
                );
              })}
            </div>
          )}

          {turns.length>=2&&!recording&&(
            <button onClick={analyze} disabled={loading} style={{ width:"100%",background:C.accent,color:"#08090d",border:"none",borderRadius:14,padding:15,fontSize:15,fontWeight:800,cursor:"pointer",marginBottom:8 }}>
              {loading?"\u2728 분석 중...":`\u{1F3AF} 미국식으로 변환 (${turns.length}턴)`}
            </button>
          )}

          {turns.length<2&&!recording&&turns.length>0&&(
            <div style={{ textAlign:"center",fontSize:11,color:C.muted,padding:"8px" }}>
              최소 2턴 이상 대화를 입력해주세요
            </div>
          )}
        </div>
      );
    }

    // ── APP ─────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState("home");
      const [screen, setScreen] = useState("home");
      const [lesson, setLesson] = useState(null);
      const [todayDone, setTodayDone] = useState(false);
      const [streak, setStreak] = useState(0);
      const [loading, setLoading] = useState(false);
      const [speakHistory, setSpeakHistory] = useState([]);
      const [aiAvailable, setAiAvailable] = useState(!!getApiKey());
      const [showApiScreen, setShowApiScreen] = useState(false);

      // Check admin mode
      const isAdmin = new URLSearchParams(window.location.search).get("admin") === ADMIN_KEY;

      useEffect(() => {
        track("visit");
        const saved = load("streak") || { count:0, lastDate:"" };
        const today = new Date().toISOString().slice(0,10);
        if (saved.lastDate === today) { setStreak(saved.count); setTodayDone(true); }
        else if (saved.lastDate === new Date(Date.now()-86400000).toISOString().slice(0,10)) setStreak(saved.count);
        else setStreak(0);
        setLesson(getTodayLesson());
        setSpeakHistory(load("speak_history") || []);
      }, []);

      const startLesson = () => {
        track("lesson_start");
        setScreen("learn");
        setTab("learn");
      };

      const finishLearn = () => {
        if (aiAvailable) { setScreen("practice"); }
        else { completeDone(); }
      };

      const completeDone = () => {
        track("lesson_done");
        const today = new Date().toISOString().slice(0,10);
        const saved = load("streak") || { count:0, lastDate:"" };
        let newStreak;
        if (saved.lastDate === new Date(Date.now()-86400000).toISOString().slice(0,10)) newStreak = saved.count + 1;
        else if (saved.lastDate === today) newStreak = saved.count;
        else newStreak = 1;
        save("streak", { count:newStreak, lastDate:today });
        setStreak(newStreak);
        setTodayDone(true);
        setScreen("home");
        setTab("home");
      };

      useEffect(() => {
        if (tab === "home") setScreen("home");
        else if (tab === "learn") setScreen("learn");
        else if (tab === "speak") setScreen("speak");
      }, [tab]);

      if (showApiScreen) {
        return (
          <div style={{ maxWidth:480,margin:"0 auto",minHeight:"100vh",background:C.bg }}>
            <ApiKeyScreen
              onSave={() => { setAiAvailable(true); setShowApiScreen(false); }}
              onSkip={() => setShowApiScreen(false)}
            />
          </div>
        );
      }

      return (
        <div style={{ maxWidth:480,margin:"0 auto",minHeight:"100vh",background:C.bg,paddingBottom:80 }}>
          {isAdmin && <AdminDashboard/>}

          {screen==="home" && (
            <HomeScreen
              streak={streak} todayDone={todayDone} lesson={lesson}
              onStart={startLesson} aiAvailable={aiAvailable}
              onEnableAI={() => setShowApiScreen(true)}
            />
          )}

          {screen==="learn" && (
            <LearnScreen lesson={lesson} loading={loading} onNext={finishLearn} aiAvailable={aiAvailable}/>
          )}

          {screen==="practice" && (
            <PracticeScreen lesson={lesson} onComplete={completeDone} aiAvailable={aiAvailable}/>
          )}

          {screen==="speak" && (
            <SpeakScreen history={speakHistory} setHistory={setSpeakHistory} aiAvailable={aiAvailable}/>
          )}

          <BottomNav tab={tab} setTab={setTab}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
